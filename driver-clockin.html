<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fleet Driver</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--border:#1e2330;--on:#00e5a0;--off:#ff4d6d;--on-dim:rgba(0,229,160,0.12);--off-dim:rgba(255,77,109,0.12);--text:#e8eaf0;--muted:#5a6080;--yellow:#f5c842;--yellow-dim:rgba(245,200,66,0.12);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
.screen{display:none;min-height:100vh;flex-direction:column;}
.screen.active{display:flex;}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.nav-title{font-size:15px;font-weight:700;color:var(--text);}
.nav-back{color:var(--on);font-family:'DM Mono',monospace;font-size:13px;background:none;border:none;cursor:pointer;}
.nav-action{color:var(--muted);font-family:'DM Mono',monospace;font-size:12px;background:none;border:none;cursor:pointer;}
.scroll-body{flex:1;overflow-y:auto;padding:20px;}
.hero{padding:8px 0 24px;}
.eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--yellow);margin-bottom:8px;text-transform:uppercase;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:48px;line-height:.95;color:var(--text);}
.hero-title span{color:var(--on);}
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}
.yard-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px 18px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.yard-card:active{transform:scale(0.98);border-color:var(--yellow);}
.yard-card-name{font-size:18px;font-weight:700;color:var(--text);margin-bottom:2px;}
.yard-card-code{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.yard-card-arrow{color:var(--yellow);font-size:20px;}
.search-wrap{position:relative;margin-bottom:14px;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:13px 16px 13px 42px;border-radius:12px;outline:none;-webkit-appearance:none;}
.search-wrap input:focus{border-color:var(--on);}
.search-wrap input::placeholder{color:var(--muted);}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
.driver-row{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.driver-row:active{transform:scale(0.98);border-color:var(--on);}
.driver-row-left{display:flex;align-items:center;gap:14px;}
.driver-fleet{font-family:'Bebas Neue',sans-serif;font-size:30px;color:var(--on);line-height:1;width:48px;}
.driver-name{font-size:16px;font-weight:600;color:var(--text);}
.driver-arrow{color:var(--muted);font-size:16px;}

/* Clock screen */
.clock-body{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 20px 36px;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;text-align:center;margin-bottom:14px;}
.info-fleet{font-family:'Bebas Neue',sans-serif;font-size:60px;line-height:1;color:var(--on);}
.info-fleet-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:8px;}
.info-name{font-size:24px;font-weight:700;color:var(--text);margin-bottom:10px;}
.info-yard-badge{display:inline-flex;align-items:center;background:rgba(245,200,66,0.1);border:1px solid rgba(245,200,66,0.3);border-radius:100px;padding:5px 14px;font-family:'DM Mono',monospace;font-size:11px;color:var(--yellow);}
.status-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;border:1px solid;border-radius:100px;padding:9px 18px;}
.status-row.on{border-color:rgba(0,229,160,.3);background:var(--on-dim);}
.status-row.off{border-color:rgba(255,77,109,.3);background:var(--off-dim);}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.status-row.on .status-dot{background:var(--on);box-shadow:0 0 8px var(--on);animation:pulse 1.8s infinite;}
.status-row.off .status-dot{background:var(--off);}
.status-text{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:2px;}
.status-row.on .status-text{color:var(--on);}
.status-row.off .status-text{color:var(--off);}
.loc-pill{display:flex;align-items:center;gap:7px;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:14px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:6px 12px;}
.loc-dot{width:6px;height:6px;border-radius:50%;}
.loc-dot.active{background:var(--on);box-shadow:0 0 5px var(--on);animation:pulse 2s infinite;}
.loc-dot.inactive{background:var(--muted);}
.loc-dot.error{background:var(--off);}
.elapsed-block{text-align:center;margin-bottom:14px;min-height:56px;}
.elapsed-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.elapsed-time{font-family:'DM Mono',monospace;font-size:36px;font-weight:500;color:var(--text);margin:4px 0;}
.elapsed-since{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.clock-btn{width:100%;border:2px solid;border-radius:18px;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;background:transparent;margin-bottom:10px;}
.clock-btn:active{transform:scale(0.97);}
.clock-btn.clock-in{border-color:var(--on);background:var(--on-dim);}
.clock-btn.clock-out{border-color:var(--off);background:var(--off-dim);}
.clock-btn-icon{font-size:36px;line-height:1;}
.clock-btn-text{font-family:'DM Mono',monospace;font-size:22px;font-weight:700;letter-spacing:3px;}
.clock-btn.clock-in .clock-btn-text{color:var(--on);}
.clock-btn.clock-out .clock-btn-text{color:var(--off);}
.clock-btn-sub{font-family:'DM Mono',monospace;font-size:11px;opacity:.6;}
.clock-btn.clock-in .clock-btn-sub{color:var(--on);}
.clock-btn.clock-out .clock-btn-sub{color:var(--off);}

/* Job card on clock screen */
.job-card{width:100%;background:var(--surface);border:2px solid rgba(245,200,66,.4);border-radius:18px;padding:18px;margin-bottom:10px;position:relative;overflow:hidden;}
.job-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow);}
.job-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.job-card-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;color:var(--yellow);text-transform:uppercase;}
.job-status-badge{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.job-details{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.job-detail{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;}
.job-detail-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.job-detail-value{font-size:15px;font-weight:700;color:var(--text);}
.job-address{background:rgba(255,255,255,.03);border-radius:10px;padding:10px 12px;margin-bottom:14px;}
.job-address-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px;}
.job-address-value{font-size:14px;color:var(--text);line-height:1.4;}
.load-time-banner{background:var(--yellow-dim);border:1px solid rgba(245,200,66,.3);border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.load-time-icon{font-size:18px;}
.load-time-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--yellow);}
.load-time-val{font-size:16px;font-weight:700;color:var(--yellow);}

/* Action buttons */
.action-btn{width:100%;border:2px solid;border-radius:16px;padding:20px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:transparent;margin-bottom:10px;}
.action-btn:active{transform:scale(0.97);}
.action-btn-icon{font-size:28px;}
.action-btn-inner{text-align:left;}
.action-btn-text{font-family:'DM Mono',monospace;font-size:16px;font-weight:700;letter-spacing:2px;}
.action-btn-sub{font-family:'DM Mono',monospace;font-size:10px;opacity:.6;margin-top:2px;}
.btn-green{border-color:var(--on);background:var(--on-dim);}
.btn-green .action-btn-text{color:var(--on);}
.btn-green .action-btn-sub{color:var(--on);}
.btn-yellow{border-color:rgba(245,200,66,.5);background:var(--yellow-dim);}
.btn-yellow .action-btn-text{color:var(--yellow);}
.btn-yellow .action-btn-sub{color:var(--yellow);}
.btn-red{border-color:rgba(255,77,109,.4);background:var(--off-dim);}
.btn-red .action-btn-text{color:var(--off);}
.btn-red .action-btn-sub{color:var(--off);}

/* Bowl timer */
.bowl-timer{background:var(--surface);border:2px solid rgba(255,77,109,.4);border-radius:16px;padding:16px;margin-bottom:10px;text-align:center;}
.bowl-timer-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--off);letter-spacing:.2em;text-transform:uppercase;margin-bottom:6px;}
.bowl-timer-time{font-family:'DM Mono',monospace;font-size:36px;font-weight:700;color:var(--off);}
.bowl-timer-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:4px;}

/* Return form */
.form-body{flex:1;overflow-y:auto;padding:20px 20px 40px;}
.form-title{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--yellow);margin-bottom:4px;}
.form-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:22px;}
.field-group{margin-bottom:16px;}
.field-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;display:block;}
.field-input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;padding:13px 14px;border-radius:12px;outline:none;-webkit-appearance:none;}
.field-input:focus{border-color:var(--yellow);}
.field-input::placeholder{color:var(--muted);}
select.field-input option{background:#13161e;}
.submit-btn{width:100%;background:var(--yellow);color:#0d0f14;border:none;border-radius:14px;padding:17px;font-family:'DM Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:8px;}
.submit-btn:active{transform:scale(0.98);}
.submit-btn:disabled{opacity:.5;}

/* Issue form */
.issue-textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 14px;border-radius:12px;outline:none;min-height:100px;resize:vertical;}
.issue-textarea:focus{border-color:var(--off);}
.issue-submit-btn{width:100%;background:var(--off);color:#fff;border:none;border-radius:14px;padding:17px;font-family:'DM Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-top:8px;}

/* Success */
.success-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;text-align:center;}
.success-icon{font-size:60px;margin-bottom:16px;}
.success-title{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--on);margin-bottom:8px;}
.success-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:28px;}
.success-back{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 28px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);cursor:pointer;}

.loading-wrap{flex:1;display:flex;align-items:center;justify-content:center;}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--on);border-radius:50%;animation:spin .8s linear infinite;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:11px 22px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:transform .3s;z-index:100;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.toast.show{transform:translateX(-50%) translateY(0);}

/* No-job notice */
.no-job{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;margin-bottom:12px;width:100%;}
.no-job-icon{font-size:32px;margin-bottom:8px;}
.no-job-text{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);line-height:1.8;}

/* Return btn on clock screen */
.return-btn{width:100%;border:2px solid rgba(245,200,66,.4);border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer;background:var(--yellow-dim);margin-bottom:10px;}
.return-btn:active{transform:scale(0.97);}
.return-btn-text{font-family:'DM Mono',monospace;font-size:15px;font-weight:700;letter-spacing:2px;color:var(--yellow);}
.return-btn-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--yellow);opacity:.6;margin-top:2px;}

#screen-map{min-height:100vh;}
#driver-map{height:calc(100vh - 187px) !important;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- YARD SELECT -->
<div class="screen active" id="screen-yard">
  <div class="scroll-body">
    <div class="hero">
      <div class="eyebrow">Fleet Driver App</div>
      <div class="hero-title">Select<br>Your<br><span>Yard</span></div>
    </div>
    <div class="section-label">Which yard are you at?</div>
    <div id="yard-list"></div>
  </div>
</div>

<!-- DRIVER SELECT -->
<div class="screen" id="screen-driver">
  <div class="nav">
    <button class="nav-back" onclick="goTo('yard')">← Back</button>
    <span class="nav-title" id="driver-screen-title">Select Driver</span>
    <div style="width:50px"></div>
  </div>
  <div class="scroll-body">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="driver-search" placeholder="Search name or fleet #…" oninput="filterDrivers()" autocomplete="off">
    </div>
    <div class="section-label">Who are you?</div>
    <div id="driver-list"></div>
  </div>
</div>

<!-- CLOCK/JOB SCREEN -->
<div class="screen" id="screen-clock">
  <div class="nav">
    <button class="nav-back" onclick="goTo('driver')">← Back</button>
    <span class="nav-title" id="clock-nav-title"></span>
    <button class="nav-action" onclick="logout()">Logout</button>
  </div>
  <div class="clock-body" id="clock-body">
    <div class="loading-wrap"><div class="spinner"></div></div>
  </div>
</div>

<!-- RETURN FORM -->
<div class="screen" id="screen-return">
  <div class="nav">
    <button class="nav-back" onclick="goTo('clock')">← Back</button>
    <span class="nav-title">Return Concrete</span>
    <div style="width:50px"></div>
  </div>
  <div class="form-body">
    <div class="form-title">🪣 Return<br>Concrete</div>
    <div class="form-sub" id="return-label">—</div>
    <div class="field-group">
      <label class="field-label">Volume (m³)</label>
      <input type="number" class="field-input" id="f-volume" placeholder="e.g. 0.7" step="0.1" min="0">
    </div>
    <div class="field-group">
      <label class="field-label">Returning to Yard</label>
      <select class="field-input" id="f-return-yard">
        <option value="">Select yard…</option>
        <option value="east-tamaki">East Tamaki (CE)</option>
        <option value="drury">Drury (CD)</option>
        <option value="ranui">Ranui (CR)</option>
        <option value="penrose">Penrose (CP)</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">Notes (optional)</label>
      <input type="text" class="field-input" id="f-return-notes" placeholder="Any additional info…">
    </div>
    <button class="submit-btn" id="return-submit-btn" onclick="submitReturn()">📤 SEND RETURN REPORT</button>
  </div>
</div>

<!-- ISSUE FORM -->
<div class="screen" id="screen-issue">
  <div class="nav">
    <button class="nav-back" onclick="goTo('clock')">← Back</button>
    <span class="nav-title">Report Issue</span>
    <div style="width:50px"></div>
  </div>
  <div class="form-body">
    <div class="form-title">⚠️ Report<br>Issue</div>
    <div class="form-sub">Describe the issue — supervisor and dispatcher will be notified immediately.</div>
    <div class="field-group">
      <label class="field-label">What happened?</label>
      <textarea class="issue-textarea" id="f-issue" placeholder="Describe the issue…"></textarea>
    </div>
    <button class="issue-submit-btn" onclick="submitIssue()">⚠️ SEND ISSUE REPORT</button>
  </div>
</div>

<!-- SUCCESS -->
<div class="screen" id="screen-success">
  <div class="success-body">
    <div class="success-icon" id="success-icon">✅</div>
    <div class="success-title" id="success-title">Done!</div>
    <div class="success-sub" id="success-sub"></div>
    <button class="success-back" onclick="goTo('clock')">← Back to Shift</button>
  </div>
</div>

<!-- MAP SCREEN -->
<div class="screen" id="screen-map">
  <div class="nav">
    <button class="nav-back" onclick="goTo('clock')">← Back</button>
    <span class="nav-title" id="map-nav-title">Directions</span>
    <div style="width:50px"></div>
  </div>
  <div style="flex:1;position:relative;">
    <div id="driver-map" style="width:100%;height:100%;"></div>
    <!-- Bottom action bar -->
    <div style="position:absolute;bottom:0;left:0;right:0;background:rgba(13,15,20,0.95);border-top:1px solid var(--border);padding:16px 20px;backdrop-filter:blur(8px);">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;">Delivering to</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px;" id="map-address-label">—</div>
      <div style="display:flex;gap:10px;">
        <button onclick="confirmArrived()" style="flex:1;background:var(--on-dim);border:2px solid var(--on);border-radius:12px;padding:14px;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;letter-spacing:2px;color:var(--on);cursor:pointer;">📍 ARRIVED ON SITE</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function goTo(screen){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+screen).classList.add('active');
  if(screen==='yard')renderYards();
  if(screen==='driver')renderDrivers();
  if(screen==='clock')renderClock();
  if(screen==='return')setupReturnForm();
  if(screen==='issue')document.getElementById('f-issue').value='';
  if(screen!=='clock'){if(liveUnsub){liveUnsub();liveUnsub=null;}clearInterval(elapsedTimer);clearInterval(bowlTimer);}
  if(screen==='yard'||screen==='driver')stopLocation();
}

function renderClock(){
  document.getElementById('clock-nav-title').textContent=activeYard.name;

  if(liveUnsub)liveUnsub();

  var jobRef=db.ref('jobs/'+activeDriver.id);

  shiftRef.on('value',function(s){shiftData=s.val()||{};rebuild();});
  jobRef.on('value',function(s){jobData=s.val();rebuild();});

function buildClockUI(shift,job){
  clearInterval(elapsedTimer);clearInterval(bowlTimer);
  currentShift=shift;currentJob=job;
  var isOn=shift.onShift===true;
  var clockInTime=shift.clockInTime||null;
  var html='';

  // Info card
  html+='<div class="info-card">'+
    '<div class="info-fleet">'+activeDriver.fleet+'</div>'+
    '<div class="info-fleet-label">FLEET #</div>'+
    '<div class="info-name">'+activeDriver.name+'</div>'+
    '<div class="info-yard-badge">'+activeYard.code+' · '+activeYard.name+'</div>'+
  '</div>';

  // Shift status
  html+='<div class="status-row '+(isOn?'on':'off')+'">'+
    '<div class="status-dot"></div>'+
    '<div class="status-text">'+(isOn?'ON SHIFT':'OFF SHIFT')+'</div>'+
  '</div>';

  // Location pill
  html+='<div class="loc-pill"><div class="loc-dot inactive" id="loc-dot"></div><span id="loc-text">'+(isOn?'Getting location…':'Location inactive')+'</span></div>';

  // Elapsed
  if(isOn&&clockInTime){
    html+='<div class="elapsed-block">'+
      '<div class="elapsed-label">Time on shift</div>'+
      '<div class="elapsed-time" id="elapsed-time">00:00:00</div>'+
      '<div class="elapsed-since">Clocked in at '+formatTime(clockInTime)+'</div>'+
    '</div>';
  } else {
    html+='<div style="height:14px"></div>';
  }

  // Job card if assigned
  if(isOn&&job&&job.status!=='done'){
    html+=buildJobCard(job);
  } else if(isOn&&(!job||job.status==='done')){
    html+='<div class="no-job"><div class="no-job-icon">📋</div><div class="no-job-text">No job assigned yet.<br>Waiting for dispatch…</div></div>';
    // Return concrete button (standalone, no job)
    html+='<div class="return-btn" onclick="goTo(\'return\')">'+
      '<div style="font-size:24px">🪣</div>'+
      '<div><div class="return-btn-text">RETURN CONCRETE</div><div class="return-btn-sub">Tap to report return load</div></div>'+
    '</div>';
  }

  // Clock in/out button
  html+='<button class="clock-btn '+(isOn?'clock-out':'clock-in')+'" onclick="handleClockToggle('+(isOn?'true':'false')+','+clockInTime+')">'+
    '<div class="clock-btn-icon">'+(isOn?'⏹':'▶')+'</div>'+
    '<div class="clock-btn-text">'+(isOn?'CLOCK OUT':'CLOCK IN')+'</div>'+
    '<div class="clock-btn-sub">'+(isOn?'Tap to finish your shift':'Tap to start your shift')+'</div>'+
  '</button>';

  document.getElementById('clock-body').innerHTML=html;

  if(isOn&&clockInTime){
    updateElapsed(clockInTime);
    elapsedTimer=setInterval(function(){updateElapsed(clockInTime);},1000);
    startLocation();
  } else {
    stopLocation();
  }

  // Bowl timer for return status
  if(job&&job.status==='return'&&job.departureTime){
    updateBowlTimer(job.departureTime);
    bowlTimer=setInterval(function(){updateBowlTimer(job.departureTime);},1000);
  }
}

function buildJobCard(job){
  var st=job.status||'assigned';
  var statusColors={'assigned':'#f5c842','started':'#f5c842','loading':'#4af0c0','loaded':'#00e5a0','prechecks':'#00e5a0','transit':'#00e5a0','arrived':'#00e5a0','pouring':'#00e5a0','return':'#f5c842','issue':'#ff4d6d'};
  var statusLabels={'assigned':'ASSIGNED','started':'STARTED','loading':'LOADING','loaded':'LOADED','prechecks':'PRE-CHECKS','transit':'IN TRANSIT','arrived':'ARRIVED','pouring':'POURING','return':'RETURNING','issue':'ISSUE'};
  var color=statusColors[st]||'#f5c842';

  var html='<div class="job-card">'+
    '<div class="job-card-header">'+
      '<div class="job-card-title">📋 Dispatched Job</div>'+
      '<div class="job-status-badge" style="color:'+color+';border-color:'+color+'40;background:'+color+'15">'+
        (statusLabels[st]||st.toUpperCase())+'</div>'+
    '</div>'+
    '<div class="job-details">'+
      '<div class="job-detail"><div class="job-detail-label">Docket</div><div class="job-detail-value">'+job.docket+'</div></div>'+
      '<div class="job-detail"><div class="job-detail-label">MPa</div><div class="job-detail-value">'+job.mpa+'</div></div>'+
      '<div class="job-detail"><div class="job-detail-label">Slump</div><div class="job-detail-value">'+job.slump+'mm</div></div>'+
      '<div class="job-detail"><div class="job-detail-label">Mix Type</div><div class="job-detail-value">'+job.mixType+'</div></div>'+
    '</div>'+
    '<div class="job-address"><div class="job-address-label">📍 Delivery Address</div><div class="job-address-value">'+job.address+'</div></div>';

  if(job.loadTime){
    html+='<div class="load-time-banner"><div class="load-time-icon">⏰</div><div><div class="load-time-text">SCHEDULED LOAD TIME</div><div class="load-time-val">'+job.loadTime+'</div></div></div>';
  }

  // Bowl timer
  if(st==='return'&&job.departureTime){
    html+='<div class="bowl-timer">'+
      '<div class="bowl-timer-label">🪣 Concrete in Bowl</div>'+
      '<div class="bowl-timer-time" id="bowl-time">--:--:--</div>'+
      '<div class="bowl-timer-sub">Time since departed yard</div>'+
    '</div>';
  }

  // Action buttons based on status
  html+='<div style="margin-top:4px">';
  if(st==='assigned'){
    html+=actionBtn('green','▶','START JOB','Tap when ready to proceed','handleJobAction(\'started\')');
  } else if(st==='started'){
    html+=actionBtn('green','🏗️','LOADING','Tap when truck is loading','handleJobAction(\'loading\')');
  } else if(st==='loading'){
    html+=actionBtn('green','✅','DONE LOADING','Tap when fully loaded','handleJobAction(\'loaded\')');
  } else if(st==='loaded'){
    html+=actionBtn('green','🔍','PRE-TRIP CHECKS DONE','Tap when checks complete','handleJobAction(\'prechecks\')');
  } else if(st==='prechecks'){
    html+=actionBtn('green','🚛','IN TRANSIT','Opens map with directions','handleTransit()');
  } else if(st==='transit'){
    html+=actionBtn('green','📍','ARRIVED ON SITE','Tap when you arrive','handleJobAction(\'arrived\')');
  } else if(st==='arrived'){
    html+=actionBtn('green','🪣','START POURING','Tap when pouring begins','handleJobAction(\'pouring\')');
  } else if(st==='pouring'){
    html+=actionBtn('green','✅','POUR COMPLETE','Tap when finished','handleJobAction(\'done\')');
    html+=actionBtn('yellow','🔄','RETURN CONCRETE','Has leftover concrete','goTo(\'return\')');
    html+=actionBtn('red','⚠️','REPORT ISSUE','Something went wrong','goTo(\'issue\')');
  } else if(st==='return'){
    html+=actionBtn('green','🏠','ARRIVED AT YARD','Tap when back at yard — completes job','handleArrivedAtYard()');
  }
  html+='</div></div>';
  return html;
}

function actionBtn(color,icon,text,sub,onclick){
  return '<div class="action-btn btn-'+color+'" onclick="'+onclick+'">'+
    '<div class="action-btn-icon">'+icon+'</div>'+

      '<div class="action-btn-text">'+text+'</div>'+
      '<div class="action-btn-sub">'+sub+'</div>'+
    '</div></div>';
}

function handleJobAction(newStatus){
  if(!currentJob)return;
  var updates={status:newStatus,updatedAt:Date.now()};
  if(newStatus==='loading') updates.loadingStartTime=Date.now();
  if(newStatus==='transit') updates.departureTime=Date.now();
  if(newStatus==='arrived') updates.arrivalTime=Date.now();
  if(newStatus==='pouring') updates.pouringStartTime=Date.now();
  if(newStatus==='done')    updates.completedTime=Date.now();
  db.ref('jobs/'+activeDriver.id).update(updates);

  // Notify for key statuses
  if(newStatus==='loading'||newStatus==='arrived'){
    db.ref('notifications').push({
      type:newStatus,
      driverName:activeDriver.name,
      fleet:activeDriver.fleet,
      yardName:activeYard.name,
      docket:currentJob.docket,
      address:currentJob.address,
      timestamp:Date.now(),
      seen:false
    });
  }
  showToast('✓ Status updated!');
}

function renderDriverMap(){
  var mapDiv=document.getElementById('driver-map');
  if(!mapDiv||!window.google)return;
  if(!driverMapInstance){
    driverMapInstance=new google.maps.Map(mapDiv,{
      zoom:13,
      center:lastLoc?{lat:lastLoc.lat,lng:lastLoc.lng}:{lat:-36.85,lng:174.77},
      mapTypeControl:false,streetViewControl:false,fullscreenControl:false,
      styles:[
        {elementType:'geometry',stylers:[{color:'#1a1d27'}]},
        {elementType:'labels.text.stroke',stylers:[{color:'#1a1d27'}]},
        {elementType:'labels.text.fill',stylers:[{color:'#8a9bb0'}]},
        {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2d3a'}]},
        {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3d4a'}]},
        {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1117'}]},
        {featureType:'poi',elementType:'geometry',stylers:[{color:'#1e2130'}]},
      ]
    });
  }
  if(!currentJob||!currentJob.address)return;
  var geocoder=new google.maps.Geocoder();
  geocoder.geocode({address:currentJob.address+', Auckland, New Zealand'},function(results,status){
    if(status==='OK'&&results[0]){
      var destLatLng=results[0].geometry.location;
      // Clear old markers
      if(driverMapInstance._destMarker) driverMapInstance._destMarker.setMap(null);
      if(driverMapInstance._myMarker)   driverMapInstance._myMarker.setMap(null);
      if(driverMapInstance._renderer)   driverMapInstance._renderer.setMap(null);
      // Destination pin
      driverMapInstance._destMarker=new google.maps.Marker({
        position:destLatLng,map:driverMapInstance,title:'Delivery site',
        icon:{path:google.maps.SymbolPath.BACKWARD_CLOSED_ARROW,fillColor:'#f5c842',fillOpacity:1,strokeColor:'#0d0f14',strokeWeight:2,scale:10},
      });
      // My position
      if(lastLoc){
        driverMapInstance._myMarker=new google.maps.Marker({
          position:{lat:lastLoc.lat,lng:lastLoc.lng},map:driverMapInstance,title:'You',
          icon:{path:google.maps.SymbolPath.CIRCLE,fillColor:'#00e5a0',fillOpacity:1,strokeColor:'#0d0f14',strokeWeight:2,scale:10},
          label:{text:'ME',color:'#0d0f14',fontSize:'8px',fontWeight:'bold'}
        });
        // Draw route
        var directionsService=new google.maps.DirectionsService();
        var renderer=new google.maps.DirectionsRenderer({suppressMarkers:true,polylineOptions:{strokeColor:'#00e5a0',strokeWeight:4,strokeOpacity:0.8}});
        renderer.setMap(driverMapInstance);
        driverMapInstance._renderer=renderer;
        directionsService.route({
          origin:{lat:lastLoc.lat,lng:lastLoc.lng},
          destination:destLatLng,
          travelMode:google.maps.TravelMode.DRIVING
        },function(result,status){
          if(status==='OK'){
            renderer.setDirections(result);
            var leg=result.routes[0].legs[0];
            document.getElementById('map-nav-title').textContent=leg.duration.text+' away · '+leg.distance.text;
          }
        });
      } else {
        driverMapInstance.setCenter(destLatLng);
      }
    }
  });
}

// Yard addresses for ETA calculation
var YARD_ADDRESSES={
  'east-tamaki':'20 Jarvis Way, Ōtara, Auckland 2019',
  'drury':'41 Bill Stevenson Drive, Drury 2579',
  'ranui':'7 Airdrie Road, Ranui, Auckland 0612',
  'penrose':'97 Gavin St, Mount Wellington, Auckland 1060'
};

function submitReturn(){
  var volume=document.getElementById('f-volume').value.trim();
  var yardId=document.getElementById('f-return-yard').value;
  var notes=document.getElementById('f-return-notes').value.trim();
  if(!volume||!yardId){showToast('⚠ Fill in all fields');return;}
  var yardNames={'east-tamaki':'East Tamaki (CE)','drury':'Drury (CD)','ranui':'Ranui (CR)','penrose':'Penrose (CP)'};
  var btn=document.getElementById('return-submit-btn');
  btn.disabled=true;
  btn.textContent='Calculating ETA…';

  var departureTime=currentJob?currentJob.departureTime:Date.now();
  var bowlDuration=departureTime?Math.floor((Date.now()-departureTime)/1000):0;

  var report={
    driverName:activeDriver.name,fleet:activeDriver.fleet,
    fromYardId:activeYard.id,fromYardName:activeYard.name,
    returningTo:yardId,returningToName:yardNames[yardId]||yardId,
    volume:parseFloat(volume),notes:notes,
    docket:currentJob?currentJob.docket:'—',
    mpa:currentJob?currentJob.mpa:'—',
    lat:lastLoc?lastLoc.lat:null,lng:lastLoc?lastLoc.lng:null,
    departureTime:departureTime,
    bowlDurationSeconds:bowlDuration,
    submittedAt:Date.now(),status:'pending',
    etaMinutes:null,etaText:null,etaTimestamp:null
  };

  function saveReport(etaMinutes, etaText, etaTimestamp){
    report.etaMinutes=etaMinutes||null;
    report.etaText=etaText||null;
    report.etaTimestamp=etaTimestamp||null;
    db.ref('returns').push(report).then(function(){
      if(currentJob) db.ref('jobs/'+activeDriver.id).update({
        status:'return',returnSubmittedAt:Date.now(),
        etaText:etaText||null,etaTimestamp:etaTimestamp||null
      });
      document.getElementById('success-icon').textContent='🪣';
      document.getElementById('success-title').textContent='Return Reported!';
      var etaLine=etaText?'<br>ETA: <strong>'+etaText+'</strong>':'';
      document.getElementById('success-sub').innerHTML='Supervisor has been notified.<br>'+volume+'m³ returning to '+yardNames[yardId]+etaLine;
      goTo('success');
    }).catch(function(){btn.disabled=false;btn.textContent='📤 SEND RETURN REPORT';showToast('⚠ Failed. Try again.');});
  }

  // Try to get ETA via Directions API if we have GPS
  if(lastLoc && window.google && YARD_ADDRESSES[yardId]){
    var directionsService=new google.maps.DirectionsService();
    directionsService.route({
      origin:{lat:lastLoc.lat,lng:lastLoc.lng},
      destination:YARD_ADDRESSES[yardId],
      travelMode:google.maps.TravelMode.DRIVING
    }, function(result, status){
      if(status==='OK'){
        var leg=result.routes[0].legs[0];
        var secs=leg.duration.value;
        var etaMins=Math.ceil(secs/60);
        var etaArrival=new Date(Date.now()+secs*1000);
        var etaTimeStr=etaArrival.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});
        saveReport(etaMins, leg.duration.text+' ('+etaTimeStr+')', etaArrival.getTime());
      } else {
        // No ETA available, save anyway
        saveReport(null, null, null);
      }
    });
  } else {
    saveReport(null, null, null);
  }
}

function submitIssue(){
  var desc=document.getElementById('f-issue').value.trim();
  if(!desc){showToast('⚠ Please describe the issue');return;}
  db.ref('issues').push({
    driverName:activeDriver.name,fleet:activeDriver.fleet,
    yardName:activeYard.name,description:desc,
    docket:currentJob?currentJob.docket:'—',
    lat:lastLoc?lastLoc.lat:null,lng:lastLoc?lastLoc.lng:null,
    submittedAt:Date.now(),status:'open'
  }).then(function(){
    if(currentJob) db.ref('jobs/'+activeDriver.id).update({status:'issue'});
    db.ref('notifications').push({type:'issue',driverName:activeDriver.name,fleet:activeDriver.fleet,description:desc,timestamp:Date.now(),seen:false});
    document.getElementById('success-icon').textContent='⚠️';
    document.getElementById('success-title').textContent='Issue Reported';

// Clock in/out
function handleClockToggle(isOn,clockInTime){
  var newStatus=!isOn;
  if(!confirm(newStatus?'Clock in as '+activeDriver.name+'?':'Clock out and finish your shift?'))return;
  db.ref('shifts/'+activeDriver.id).set({
    onShift:newStatus,driverName:activeDriver.name,fleet:activeDriver.fleet,
    yardId:activeYard.id,yardName:activeYard.name,yardCode:activeYard.code,
    clockInTime:newStatus?Date.now():null,lastUpdated:Date.now()
  }).then(function(){
    if(!newStatus){
      db.ref('locations/'+activeDriver.id).remove();
      db.ref('jobs/'+activeDriver.id).remove();
      stopLocation();
    }
    showToast(newStatus?'✓ Clocked in!':'✓ Clocked out!');
  });
}

// Location
function startLocation(){
  if(!navigator.geolocation){setLocStatus('error','GPS not supported');return;}
  stopLocation();
  locationWatcher=navigator.geolocation.watchPosition(
    function(pos){
      lastLoc={lat:pos.coords.latitude,lng:pos.coords.longitude};
      setLocStatus('active','Sharing live · ±'+Math.round(pos.coords.accuracy)+'m');
      db.ref('locations/'+activeDriver.id).set({
        lat:pos.coords.latitude,lng:pos.coords.longitude,accuracy:pos.coords.accuracy,
        driverName:activeDriver.name,fleet:activeDriver.fleet,
        yardId:activeYard.id,yardName:activeYard.name,yardCode:activeYard.code,
        updatedAt:Date.now()
      });
    },
    function(err){setLocStatus('error',err.code===1?'Location denied':'GPS unavailable');},
    {enableHighAccuracy:true,maximumAge:15000,timeout:10000}
  );
}
function stopLocation(){if(locationWatcher!==null){navigator.geolocation.clearWatch(locationWatcher);locationWatcher=null;}}
function setLocStatus(state,text){
  var dot=document.getElementById('loc-dot'),lbl=document.getElementById('loc-text');
  if(!dot||!lbl)return;
  dot.className='loc-dot '+(state==='active'?'active':state==='error'?'error':'inactive');
  lbl.textContent=text;
}

// Timers
function updateElapsed(t){
  var el=document.getElementById('elapsed-time');if(!el)return;
  var d=Date.now()-t,h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  el.textContent=pad(h)+':'+pad(m)+':'+pad(s);
}
function updateBowlTimer(t){
  var el=document.getElementById('bowl-time');if(!el)return;
  var d=Date.now()-t,h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
  el.textContent=pad(h)+':'+pad(m)+':'+pad(s);
  // Warn if over 90 min
  if(d>5400000) el.style.color='#ff4d6d';
}
function formatTime(ts){return ts?new Date(ts).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'}):'—';}
function pad(n){return String(n).padStart(2,'0');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

renderYards();
</script>
