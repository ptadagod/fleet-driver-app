<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Shift Tracker — Live</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#13161e;--border:#1e2330;--on:#00e5a0;--off:#ff4d6d;--on-dim:rgba(0,229,160,0.12);--off-dim:rgba(255,77,109,0.12);--text:#e8eaf0;--muted:#5a6080;--yellow:#f5c842;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

  /* ── TABS ── */
  .tab-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:0;z-index:20;}
  .tab-btn{flex:1;padding:16px;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;}
  .tab-btn.active{color:var(--on);border-bottom-color:var(--on);}
  .tab-content{display:none;} .tab-content.active{display:block;}

  /* ── MAP TAB ── */
  #map-container{position:relative;}
  #map{width:100%;height:calc(100vh - 53px);}
  .map-legend{position:absolute;bottom:20px;left:20px;background:rgba(13,15,20,0.92);border:1px solid var(--border);border-radius:12px;padding:14px 18px;font-family:'DM Mono',monospace;font-size:11px;z-index:5;backdrop-filter:blur(8px);}
  .map-legend-title{color:var(--yellow);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;font-size:10px;}
  .legend-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;color:var(--text);}
  .legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
  .map-stats{position:absolute;top:12px;left:12px;display:flex;gap:8px;z-index:5;flex-wrap:wrap;}
  .map-stat{background:rgba(13,15,20,0.92);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;backdrop-filter:blur(8px);}
  .map-stat .dot{width:7px;height:7px;border-radius:50%;}
  .map-stat.on-s .dot{background:var(--on);box-shadow:0 0 5px var(--on);}
  .map-stat.off-s .dot{background:var(--off);}
  .map-stat .n{color:var(--text);font-weight:600;margin-right:2px;}

  /* ── LIST TAB ── */
  .container{max-width:960px;margin:0 auto;padding:28px 24px;}
  .header-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:24px;}
  .eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--yellow);margin-bottom:6px;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(28px,5vw,48px);letter-spacing:.03em;line-height:.9;}
  h1 span{color:var(--on);}
  .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px;}
  .live-badge{display:flex;align-items:center;gap:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--on);padding:6px 12px;border:1px solid rgba(0,229,160,.3);border-radius:100px;background:var(--on-dim);}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--on);animation:pulse 1.5s infinite;}
  .live-clock{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;line-height:1.8;}
  .live-clock strong{display:block;font-size:18px;color:var(--text);}
  .live-clock .date-str{color:var(--yellow);font-size:10px;letter-spacing:.1em;}
  .conn-status{font-family:'DM Mono',monospace;font-size:11px;display:flex;align-items:center;gap:6px;}
  .conn-dot{width:7px;height:7px;border-radius:50%;}
  .conn-dot.on{background:var(--on);box-shadow:0 0 6px var(--on);}
  .conn-dot.off{background:var(--off);}

  .yard-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
  .yard-selector{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:10px;margin-bottom:20px;}
  .yard-btn{display:flex;flex-direction:column;align-items:flex-start;gap:2px;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 16px;cursor:pointer;transition:all .18s;text-align:left;}
  .yard-btn:hover{border-color:rgba(245,200,66,.4);transform:translateY(-2px);}
  .yard-btn.active{border-color:var(--yellow);background:rgba(245,200,66,.07);}
  .yard-btn .yn{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--text);line-height:1;}
  .yard-btn.active .yn{color:var(--yellow);}
  .yard-btn .yc{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;margin-bottom:5px;}
  .yard-btn .ym{font-family:'DM Mono',monospace;font-size:11px;display:flex;gap:8px;}
  .on-n{color:var(--on);font-weight:500;}.off-n{color:var(--off);font-weight:500;}

  .stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;}
  .stat-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:7px 14px;font-family:'DM Mono',monospace;font-size:12px;}
  .stat-pill .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .stat-pill.on-c .dot{background:var(--on);box-shadow:0 0 6px var(--on);}
  .stat-pill.off-c .dot{background:var(--off);}
  .stat-pill.tot-c .dot{background:var(--yellow);}
  .stat-pill .num{font-size:15px;font-weight:500;color:var(--text);margin-right:2px;}

  .search-wrap{position:relative;margin-bottom:20px;}
  .search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--muted);}
  input[type=text]{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:13px 16px 13px 44px;border-radius:12px;outline:none;transition:border-color .2s;}
  input[type=text]:focus{border-color:var(--on);}
  input[type=text]::placeholder{color:var(--muted);}

  .drivers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
  .driver-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;position:relative;overflow:hidden;animation:fadeUp .3s ease both;transition:border-color .2s,box-shadow .2s;cursor:pointer;}
  .driver-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0;}
  .driver-card.on-shift::before{background:var(--on);}
  .driver-card.off-shift::before{background:var(--off);}
  .driver-card.on-shift:hover{border-color:var(--on);box-shadow:0 8px 30px rgba(0,229,160,.12);}
  .driver-card.off-shift:hover{border-color:var(--off);box-shadow:0 8px 30px rgba(255,77,109,.12);}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
  .fleet-num{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;}
  .on-shift .fleet-num{color:var(--on);}.off-shift .fleet-num{color:var(--text);}
  .fleet-lbl{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1.5px;}
  .status-badge{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;padding:5px 9px;border-radius:100px;border:1px solid;}
  .status-badge .blink{width:6px;height:6px;border-radius:50%;}
  .on-shift .status-badge{color:var(--on);border-color:rgba(0,229,160,.3);background:var(--on-dim);}
  .on-shift .status-badge .blink{background:var(--on);box-shadow:0 0 5px var(--on);animation:pulse 2s infinite;}
  .off-shift .status-badge{color:var(--off);border-color:rgba(255,77,109,.3);background:var(--off-dim);}
  .off-shift .status-badge .blink{background:var(--off);}
  .driver-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .clock-time{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
  .clock-time span{color:var(--on);}
  .has-location{font-family:'DM Mono',monospace;font-size:10px;color:var(--on);margin-top:4px;display:flex;align-items:center;gap:4px;}

  .section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:8px;display:flex;align-items:center;gap:12px;}
  .section-label::after{content:'';flex:1;height:1px;background:var(--border);}

  footer{margin-top:50px;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<!-- Tab Bar -->
<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('list')" id="tab-list">📋 Shift List</button>
  <button class="tab-btn" onclick="switchTab('map')" id="tab-map">🗺️ Live Map</button>
</div>

<!-- MAP TAB -->
<div class="tab-content active" id="content-map" style="display:none;">
  <div id="map-container">
    <div class="map-stats" id="map-stats"></div>
    <div id="map"></div>
    <div class="map-legend">
      <div class="map-legend-title">Legend</div>
      <div class="legend-row"><div class="legend-dot" style="background:#00e5a0"></div> On Shift · Live Location</div>
      <div class="legend-row"><div class="legend-dot" style="background:#ff4d6d"></div> On Shift · No GPS Yet</div>
      <div class="legend-row"><div class="legend-dot" style="background:#5a6080"></div> Off Shift</div>
    </div>
  </div>
</div>

<!-- LIST TAB -->
<div class="tab-content active" id="content-list">
  <div class="container">
    <div class="header-top">
      <div>
        <div class="eyebrow">WE 8th March 2026 · Live Shift Board</div>
        <h1>Fleet<br><span>Shift</span><br>Tracker</h1>
      </div>
      <div class="header-right">
        <div class="live-badge"><div class="live-dot"></div>LIVE</div>
        <div class="live-clock">
          <div class="date-str" id="dateStr">—</div>
          <strong id="clockTime">--:--:--</strong>
          Live Clock
        </div>
        <div class="conn-status">
          <div class="conn-dot off" id="connDot"></div>
          <span id="connText">Connecting…</span>
        </div>
      </div>
    </div>

    <div class="yard-label">Select Yard</div>
    <div class="yard-selector" id="yardSelector"></div>

    <div class="stats-bar">
      <div class="stat-pill on-c"><div class="dot"></div><span><span class="num" id="onCount">0</span> On Shift</span></div>
      <div class="stat-pill off-c"><div class="dot"></div><span><span class="num" id="offCount">0</span> Off Shift</span></div>
      <div class="stat-pill tot-c"><div class="dot"></div><span><span class="num" id="totalCount">0</span> Total</span></div>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search driver name or fleet #…">
    </div>

    <div class="section-label" id="onLabel">On Shift</div>
    <div class="drivers-grid" id="onGrid"></div>
    <div class="section-label" id="offLabel" style="margin-top:24px">Off Shift</div>
    <div class="drivers-grid" id="offGrid"></div>

    <footer>Fleet Operations · Live Shift Board · 2026</footer>
  </div>
</div>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBt_8TZ4cBONkK_OSJurYnBCJSm2Zpi8uc&callback=initMap" async defer></script>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey:            "AIzaSyCzvWNFjDlt-tjaAigMVZ9BicWCUa0guG0",
  authDomain:        "fleetshifttracker.firebaseapp.com",
  databaseURL:       "https://fleetshifttracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "fleetshifttracker",
  storageBucket:     "fleetshifttracker.firebasestorage.app",
  messagingSenderId: "276983000908",
  appId:             "1:276983000908:web:7948d3ccab92359795e9e9"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

const yards = [
  {id:'east-tamaki',name:'East Tamaki',code:'CE',drivers:[
    {id:'ce1',name:'Joel',fleet:'269'},{id:'ce2',name:'Wallace',fleet:'683'},
    {id:'ce3',name:'Jameem',fleet:'280'},{id:'ce4',name:'Parnil',fleet:'394'},
    {id:'ce5',name:'Peter',fleet:'304'},{id:'ce6',name:'Zainal',fleet:'388'},
    {id:'ce7',name:'Parmdeep',fleet:'484'},{id:'ce8',name:'Nikhil',fleet:'356'},
    {id:'ce9',name:'Mohammed',fleet:'351'},{id:'ce10',name:'Sumit R',fleet:'435'},
    {id:'ce11',name:'TK',fleet:'416'},
  ]},
  {id:'drury',name:'Drury',code:'CD',drivers:[
    {id:'cd1',name:'Karamjit',fleet:'281'},{id:'cd2',name:'Sachpreet',fleet:'467'},
    {id:'cd3',name:'Priyantha',fleet:'446'},{id:'cd4',name:'Mandeep',fleet:'306'},
    {id:'cd5',name:'Bhupinder',fleet:'298'},{id:'cd6',name:'Rupinder',fleet:'469'},
    {id:'cd7',name:'Aman',fleet:'301'},{id:'cd8',name:'Harpreet',fleet:'391'},
  ]},
  {id:'ranui',name:'Ranui',code:'CR',drivers:[
    {id:'cr1',name:'Richard',fleet:'282'},{id:'cr2',name:'Grupreet',fleet:'468'},
    {id:'cr3',name:'Tharindu',fleet:'441'},{id:'cr4',name:'Gayan',fleet:'442'},
    {id:'cr5',name:'Wajara',fleet:'462'},
  ]},
  {id:'penrose',name:'Penrose',code:'CP',drivers:[
    {id:'cp1',name:'Akhilesh',fleet:'272'},{id:'cp2',name:'Shiv',fleet:'433'},
    {id:'cp3',name:'Adil',fleet:'418'},{id:'cp4',name:'Baljit',fleet:'422'},
    {id:'cp5',name:'Taranpreet',fleet:'421'},{id:'cp6',name:'Manish',fleet:'352'},
    {id:'cp7',name:'Jalal',fleet:'299'},{id:'cp8',name:'Gagandeep',fleet:'470'},
    {id:'cp9',name:'Sukhbir',fleet:'395'},{id:'cp10',name:'Davinder',fleet:'466'},
    {id:'cp11',name:'Jaspreet',fleet:'354'},{id:'cp12',name:'Airun',fleet:'427'},
    {id:'cp13',name:'Rem',fleet:'419'},{id:'cp14',name:'Ravneet',fleet:'465'},
    {id:'cp15',name:'Daba',fleet:'445'},
  ]},
];

const allDrivers = yards.flatMap(y => y.drivers.map(d => ({...d, yardName:y.name, yardCode:y.code})));

let liveShifts    = {};
let liveLocations = {};
let activeYardId  = yards[0].id;
let searchQuery   = '';
let mapInstance   = null;
let mapMarkers    = {};
let mapInfoWindow = null;

// ── Firebase listeners ────────────────────────────────────
onValue(ref(db, 'shifts'), snap => {
  liveShifts = snap.val() || {};
  document.getElementById('connDot').className = 'conn-dot on';
  document.getElementById('connText').textContent = 'Live';
  render();
  updateMapMarkers();
});

onValue(ref(db, 'locations'), snap => {
  liveLocations = snap.val() || {};
  updateMapMarkers();
  render();
});

// ── Tabs ──────────────────────────────────────────────────
window.switchTab = (tab) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => { c.style.display='none'; c.classList.remove('active'); });
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('content-' + tab).style.display = 'block';
  if (tab === 'map' && mapInstance) {
    setTimeout(() => {
      google.maps.event.trigger(mapInstance, 'resize');
      fitMapToMarkers();
    }, 100);
  }
};

// ── Map ───────────────────────────────────────────────────
window.initMap = () => {
  mapInstance = new google.maps.Map(document.getElementById('map'), {
    center: { lat: -36.8485, lng: 174.7633 }, // Auckland NZ
    zoom: 11,
    styles: [
      {elementType:'geometry',stylers:[{color:'#1a1d27'}]},
      {elementType:'labels.text.stroke',stylers:[{color:'#1a1d27'}]},
      {elementType:'labels.text.fill',stylers:[{color:'#8a9bb0'}]},
      {featureType:'road',elementType:'geometry',stylers:[{color:'#2a2d3a'}]},
      {featureType:'road',elementType:'geometry.stroke',stylers:[{color:'#1a1d27'}]},
      {featureType:'road.highway',elementType:'geometry',stylers:[{color:'#3a3d4a'}]},
      {featureType:'water',elementType:'geometry',stylers:[{color:'#0d1117'}]},
      {featureType:'poi',elementType:'geometry',stylers:[{color:'#1e2130'}]},
      {featureType:'transit',elementType:'geometry',stylers:[{color:'#1e2130'}]},
      {featureType:'administrative',elementType:'geometry.stroke',stylers:[{color:'#2a3040'}]},
    ],
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: true,
  });
  mapInfoWindow = new google.maps.InfoWindow();
  updateMapMarkers();
};

function makeMarkerIcon(color, label) {
  return {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: color,
    fillOpacity: 1,
    strokeColor: '#0d0f14',
    strokeWeight: 2,
    scale: 14,
  };
}

function updateMapMarkers() {
  if (!mapInstance) return;

  const onShiftDrivers = allDrivers.filter(d => liveShifts[d.id]?.onShift === true);

  // Remove markers for drivers no longer on shift
  Object.keys(mapMarkers).forEach(id => {
    if (!liveShifts[id]?.onShift) {
      mapMarkers[id].setMap(null);
      delete mapMarkers[id];
    }
  });

  onShiftDrivers.forEach(driver => {
    const loc = liveLocations[driver.id];
    const hasLoc = loc && loc.lat && loc.lng;
    const color = hasLoc ? '#00e5a0' : '#ff4d6d';
    const shift = liveShifts[driver.id] || {};

    if (hasLoc) {
      const pos = { lat: loc.lat, lng: loc.lng };

      if (mapMarkers[driver.id]) {
        mapMarkers[driver.id].setPosition(pos);
        mapMarkers[driver.id].setIcon(makeMarkerIcon(color));
      } else {
        const marker = new google.maps.Marker({
          position: pos,
          map: mapInstance,
          icon: makeMarkerIcon(color),
          title: driver.name,
          label: {
            text: driver.fleet,
            color: '#0d0f14',
            fontSize: '11px',
            fontWeight: 'bold',
          },
          animation: google.maps.Animation.DROP,
        });

        marker.addListener('click', () => {
          const updated = loc.updatedAt ? new Date(loc.updatedAt).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'}) : '—';
          const clockIn = shift.clockInTime ? new Date(shift.clockInTime).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'}) : '—';
          mapInfoWindow.setContent(`
            <div style="font-family:'DM Sans',sans-serif;padding:4px;min-width:160px;">
              <div style="font-size:18px;font-weight:700;margin-bottom:2px;">${driver.name}</div>
              <div style="font-size:12px;color:#666;margin-bottom:8px;">Fleet #${driver.fleet} · ${driver.yardName}</div>
              <div style="font-size:12px;color:#00b87a;">● On Shift since ${clockIn}</div>
              <div style="font-size:11px;color:#999;margin-top:4px;">📍 Updated ${updated}</div>
              <div style="font-size:10px;color:#bbb;margin-top:2px;">±${Math.round(loc.accuracy||0)}m accuracy</div>
            </div>
          `);
          mapInfoWindow.open(mapInstance, marker);
        });

        mapMarkers[driver.id] = marker;
      }
    }
  });

  // Update map stats
  const onCount  = onShiftDrivers.length;
  const locCount = onShiftDrivers.filter(d => liveLocations[d.id]?.lat).length;
  document.getElementById('map-stats').innerHTML = `
    <div class="map-stat on-s"><div class="dot"></div><span class="n">${onCount}</span> On Shift</div>
    <div class="map-stat on-s"><div class="dot" style="background:#4af0c0"></div><span class="n">${locCount}</span> Live GPS</div>
  `;
}

function fitMapToMarkers() {
  if (!mapInstance || Object.keys(mapMarkers).length === 0) return;
  const bounds = new google.maps.LatLngBounds();
  Object.values(mapMarkers).forEach(m => bounds.extend(m.getPosition()));
  mapInstance.fitBounds(bounds);
  if (Object.keys(mapMarkers).length === 1) mapInstance.setZoom(14);
}

// ── List render ───────────────────────────────────────────
function isOn(id) { return liveShifts[id]?.onShift === true; }
function hasLoc(id) { return !!(liveLocations[id]?.lat); }
function formatTime(ts) { return ts ? new Date(ts).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'}) : null; }
function getYardCounts(y) { const on=y.drivers.filter(d=>isOn(d.id)).length; return{on,off:y.drivers.length-on}; }

function render() {
  const yard = yards.find(y=>y.id===activeYardId);
  const q = searchQuery.toLowerCase();
  const filtered = yard.drivers.filter(d=>d.name.toLowerCase().includes(q)||d.fleet.includes(q));
  const onD=filtered.filter(d=>isOn(d.id)), offD=filtered.filter(d=>!isOn(d.id));
  const {on,off}=getYardCounts(yard);

  document.getElementById('onCount').textContent=on;
  document.getElementById('offCount').textContent=off;
  document.getElementById('totalCount').textContent=yard.drivers.length;

  document.getElementById('yardSelector').innerHTML=yards.map(y=>{
    const{on,off}=getYardCounts(y);
    return`<button class="yard-btn ${y.id===activeYardId?'active':''}" onclick="setYard('${y.id}')">
      <div class="yn">${y.name}</div>
      <div class="yc">${y.code} · ${y.drivers.length} drivers</div>
      <div class="ym"><span class="on-n">${on} on</span><span>·</span><span class="off-n">${off} off</span></div>
    </button>`;
  }).join('');

  renderGrid('onGrid', onD);
  renderGrid('offGrid', offD);
  document.getElementById('onLabel').style.display  = onD.length  ? '' : 'none';
  document.getElementById('offLabel').style.display = offD.length ? '' : 'none';
}

function renderGrid(id, drivers) {
  document.getElementById(id).innerHTML = drivers.map((d,i)=>{
    const on=isOn(d.id), ct=liveShifts[d.id]?.clockInTime, loc=hasLoc(d.id);
    return`<div class="driver-card ${on?'on-shift':'off-shift'}" style="animation-delay:${i*.04}s" onclick="${on&&loc?`focusDriver('${d.id}')`:''}" title="${on&&loc?'Click to see on map':''}">
      <div class="card-top">
        <div><div class="fleet-num">${d.fleet}</div><div class="fleet-lbl">FLEET #</div></div>
        <div class="status-badge"><div class="blink"></div>${on?'On Shift':'Off Shift'}</div>
      </div>
      <div class="driver-name">${d.name}</div>
      ${on&&ct?`<div class="clock-time">Since <span>${formatTime(ct)}</span></div>`:''}
      ${on&&loc?`<div class="has-location">📍 Live location</div>`:''}
    </div>`;
  }).join('');
}

window.focusDriver = (driverId) => {
  const loc = liveLocations[driverId];
  if (!loc || !mapInstance) return;
  switchTab('map');
  setTimeout(() => {
    mapInstance.setCenter({lat:loc.lat, lng:loc.lng});
    mapInstance.setZoom(15);
    if (mapMarkers[driverId]) {
      google.maps.event.trigger(mapMarkers[driverId], 'click');
    }
  }, 150);
};

window.setYard=(id)=>{activeYardId=id;searchQuery='';document.getElementById('searchInput').value='';render();};
document.getElementById('searchInput').addEventListener('input',e=>{searchQuery=e.target.value.trim();render();});

function tick(){
  const now=new Date();
  document.getElementById('clockTime').textContent=now.toLocaleTimeString('en-NZ',{hour12:false});
  document.getElementById('dateStr').textContent=now.toLocaleDateString('en-NZ',{weekday:'short',day:'numeric',month:'short',year:'numeric'}).toUpperCase();
}
tick(); setInterval(tick,1000);
render();

// expose for map callback
window._firebaseReady = true;
</script>
</body>
</html>
