<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Fleet Dispatch</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--border:#1e2330;--on:#00e5a0;--off:#ff4d6d;--on-dim:rgba(0,229,160,0.12);--off-dim:rgba(255,77,109,0.12);--text:#e8eaf0;--muted:#5a6080;--yellow:#f5c842;--yellow-dim:rgba(245,200,66,0.12);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;}

/* Login */
#app{display:block;}

/* Nav */
.top-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
.top-nav-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--yellow);letter-spacing:.05em;}
.top-nav-right{display:flex;align-items:center;gap:10px;}
.nav-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--border);}
.signout-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--off);background:none;border:1px solid rgba(255,77,109,.3);border-radius:100px;padding:5px 10px;cursor:pointer;}

/* Tab bar */
.tab-bar{display:flex;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-btn{flex:1;padding:13px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;position:relative;}
.tab-btn.active{color:var(--yellow);border-bottom-color:var(--yellow);}
.tab-badge{position:absolute;top:6px;right:8px;background:var(--off);color:#fff;font-size:9px;font-weight:700;border-radius:100px;padding:1px 5px;display:none;}
.tab-badge.show{display:block;}
.tab-content{display:none;padding:16px;} .tab-content.active{display:block;}

/* Driver cards on dispatch tab */
.drivers-section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin:12px 0 8px;}
.dispatch-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;cursor:pointer;transition:border-color .15s;}
.dispatch-card:active{transform:scale(0.99);}
.dispatch-card.has-job{border-color:rgba(245,200,66,.3);}
.dispatch-card.has-issue{border-color:rgba(255,77,109,.5);}
.dc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.dc-left{display:flex;align-items:center;gap:12px;}
.dc-fleet{font-family:'Bebas Neue',sans-serif;font-size:34px;color:var(--on);line-height:1;width:52px;}
.dc-name{font-size:16px;font-weight:700;color:var(--text);}
.dc-yard{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:2px;}
.dc-status{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.dc-job-summary{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding-top:8px;border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;}
.dc-job-summary span{color:var(--text);}
.assign-btn{background:var(--yellow-dim);border:1px solid rgba(245,200,66,.4);color:var(--yellow);font-family:'DM Mono',monospace;font-size:11px;border-radius:100px;padding:6px 14px;cursor:pointer;margin-top:8px;}
.no-drivers{text-align:center;padding:40px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

/* Job assign modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;padding:24px 24px 40px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--yellow);margin-bottom:4px;}
.modal-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:20px;}
.field-group{margin-bottom:14px;}
.field-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block;}
.field-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;border-radius:10px;outline:none;-webkit-appearance:none;}
.field-input:focus{border-color:var(--yellow);}
.field-input::placeholder{color:var(--muted);}
select.field-input option{background:#13161e;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-btns{display:flex;gap:10px;margin-top:16px;}
.modal-submit{flex:1;background:var(--yellow);color:#0d0f14;border:none;border-radius:12px;padding:15px;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;letter-spacing:1px;cursor:pointer;}
.modal-cancel{background:none;border:1px solid var(--border);color:var(--muted);border-radius:12px;padding:15px 20px;font-family:'DM Mono',monospace;font-size:13px;cursor:pointer;}

/* Notifications tab */
.notif-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;position:relative;}
.notif-card.unread{border-color:rgba(245,200,66,.4);}
.notif-card.unread::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--yellow);border-radius:14px 14px 0 0;}
.notif-card.issue{border-color:rgba(255,77,109,.4);}
.notif-card.issue::before{background:var(--off);}
.nc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.nc-type{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;display:flex;align-items:center;gap:6px;}
.nc-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.nc-driver{font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;}
.nc-detail{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);line-height:1.7;}
.nc-detail span{color:var(--text);}
.mark-read-btn{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:100px;padding:4px 10px;cursor:pointer;margin-top:8px;}
.empty-notif{text-align:center;padding:40px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:11px 22px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:transform .3s;z-index:200;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<!-- auth handled by login.html -->

<!-- App -->
<div id="app">
  <div class="top-nav">
    <div class="top-nav-title">⚡ Dispatch</div>
    <div class="top-nav-right">
      <img class="nav-avatar" id="admin-avatar" src="" style="display:none">
      <button class="signout-btn" onclick="signOut()">Sign out</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('dispatch')" id="tab-dispatch">🚛 Drivers</button>
    <button class="tab-btn" onclick="switchTab('notifs')" id="tab-notifs">
      🔔 Alerts
      <span class="tab-badge" id="notif-badge">0</span>
    </button>
  </div>

  <!-- DISPATCH TAB -->
  <div class="tab-content active" id="content-dispatch">
    <div class="drivers-section-label">On Shift — Ready to Dispatch</div>
    <div id="driver-list"></div>
  </div>

  <!-- NOTIFICATIONS TAB -->
  <div class="tab-content" id="content-notifs">
    <div id="notif-list"></div>
  </div>
</div>

<!-- Assign Job Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Assign Job</div>
    <div class="modal-sub" id="modal-sub">—</div>

    <div class="field-group">
      <label class="field-label">Docket Number</label>
      <input type="text" class="field-input" id="m-docket" placeholder="e.g. 123456" autocomplete="off">
    </div>
    <div class="field-row">
      <div class="field-group">
        <label class="field-label">MPa</label>
        <input type="number" class="field-input" id="m-mpa" placeholder="e.g. 25">
      </div>
      <div class="field-group">
        <label class="field-label">Slump (mm)</label>
        <input type="number" class="field-input" id="m-slump" placeholder="e.g. 100">
      </div>
    </div>
    <div class="field-group">
      <label class="field-label">Mix Type</label>
      <select class="field-input" id="m-mixtype">
        <option value="">Select mix type…</option>
        <option>Standard</option>
        <option>Pump Mix</option>
        <option>Exposed Aggregate</option>
        <option>Coloured</option>
        <option>Fibre Reinforced</option>
        <option>High Strength</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field-group">
      <label class="field-label">Delivery Address</label>
      <input type="text" class="field-input" id="m-address" placeholder="e.g. 12 Main St, Auckland" autocomplete="off">
    </div>
    <div class="field-group">
      <label class="field-label">Scheduled Load Time</label>
      <input type="time" class="field-input" id="m-loadtime">
    </div>
    <div class="field-group">
      <label class="field-label">Notes (optional)</label>
      <input type="text" class="field-input" id="m-notes" placeholder="Any special instructions…">
    </div>

    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModalDirect()">Cancel</button>
      <button class="modal-submit" onclick="submitJob()">📋 ASSIGN JOB</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCzvWNFjDlt-tjaAigMVZ9BicWCUa0guG0",
  authDomain:"fleetshifttracker.firebaseapp.com",
  databaseURL:"https://fleetshifttracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"fleetshifttracker",
  storageBucket:"fleetshifttracker.firebasestorage.app",
  messagingSenderId:"276983000908",
  appId:"1:276983000908:web:7948d3ccab92359795e9e9"
});
var auth=firebase.auth(),db=firebase.database();

var STATUS_LABELS={assigned:'📋 Assigned',started:'▶ Started',loading:'🏗️ Loading',loaded:'✅ Loaded',prechecks:'🔍 Pre-checks',transit:'🚛 In Transit',arrived:'📍 Arrived',pouring:'🪣 Pouring',done:'✅ Done',return:'🔄 Returning',issue:'⚠️ Issue'};
var STATUS_COLORS={assigned:'#f5c842',started:'#f5c842',loading:'#4af0c0',loaded:'#00e5a0',prechecks:'#00e5a0',transit:'#00e5a0',arrived:'#00e5a0',pouring:'#00e5a0',done:'#5a6080',return:'#f5c842',issue:'#ff4d6d'};

var liveShifts={},liveJobs={},liveNotifs={};
var selectedDriverId=null,selectedDriverName='',selectedDriverFleet='',dbStarted=false;

auth.onAuthStateChanged(function(user){
  if(user){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    if(user.photoURL){document.getElementById('admin-avatar').src=user.photoURL;document.getElementById('admin-avatar').style.display='block';}
    if(!dbStarted)startDb();
  } else {
    document.getElementById('login-screen').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});
function signInWithGoogle(){
  document.getElementById('login-error').style.display='none';
  var provider=new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(err){
    if(err.code==='auth/popup-blocked'||err.code==='auth/popup-closed-by-user'||err.code==='auth/cancelled-popup-request'){
      auth.signInWithRedirect(provider);
    } else {
      document.getElementById('login-error').style.display='block';
      document.getElementById('login-error').textContent='Sign in failed: '+err.message;
    }
  });
}
auth.getRedirectResult().catch(function(err){
  if(err&&err.code){
    document.getElementById('login-error').style.display='block';
    document.getElementById('login-error').textContent='Sign in failed: '+err.message;
  }
});
function signOut(){auth.signOut();}

function startDb(){
  dbStarted=true;
  db.ref('shifts').on('value',function(s){liveShifts=s.val()||{};renderDrivers();});
  db.ref('jobs').on('value',function(s){liveJobs=s.val()||{};renderDrivers();});
  db.ref('notifications').on('value',function(s){
    liveNotifs=s.val()||{};
    renderNotifs();
    updateNotifBadge();
  });
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('content-'+tab).classList.add('active');
}

// Render on-shift drivers
function renderDrivers(){
  var onShift=Object.entries(liveShifts).filter(function(e){return e[1].onShift;});
  if(onShift.length===0){
    document.getElementById('driver-list').innerHTML='<div class="no-drivers">No drivers on shift yet.</div>';
    return;
  }
  document.getElementById('driver-list').innerHTML=onShift.map(function(entry,i){
    var id=entry[0],s=entry[1];
    var job=liveJobs[id];
    var hasJob=job&&job.status!=='done';
    var hasIssue=job&&job.status==='issue';
    var st=hasJob?job.status:null;
    var color=st?STATUS_COLORS[st]:'#5a6080';
    return '<div class="dispatch-card '+(hasIssue?'has-issue':hasJob?'has-job':'')+'" style="animation-delay:'+(i*.05)+'s">'+
      '<div class="dc-top">'+
        '<div class="dc-left">'+
          '<div class="dc-fleet">'+s.fleet+'</div>'+
          '<div><div class="dc-name">'+s.driverName+'</div><div class="dc-yard">'+s.yardName+'</div></div>'+
        '</div>'+
        '<div class="dc-status" style="color:'+color+';border-color:'+color+'40;background:'+color+'15">'+(st?STATUS_LABELS[st]:'● On Shift')+'</div>'+
      '</div>'+
      (hasJob?
        '<div class="dc-job-summary">'+
          '<div>Docket: <span>'+job.docket+'</span></div>'+
          '<div>'+job.mpa+'MPa</div>'+
          '<div>Slump: <span>'+job.slump+'mm</span></div>'+
          (job.address?'<div>→ <span>'+job.address+'</span></div>':'')+
        '</div>'
      :'')+
      (!hasJob||job.status==='done'?
        '<button class="assign-btn" onclick="openAssignModal(\''+id+'\',\''+s.driverName+'\',\''+s.fleet+'\')">📋 Assign Job</button>'
      :
        '<button class="assign-btn" style="color:var(--off);border-color:rgba(255,77,109,.3)" onclick="clearJob(\''+id+'\')">✕ Clear Job</button>'
      )+
    '</div>';
  }).join('');
}

// Assign modal
function openAssignModal(driverId,name,fleet){
  selectedDriverId=driverId;selectedDriverName=name;selectedDriverFleet=fleet;
  document.getElementById('modal-sub').textContent=name+' · Fleet '+fleet;
  document.getElementById('m-docket').value='';
  document.getElementById('m-mpa').value='';
  document.getElementById('m-slump').value='';
  document.getElementById('m-mixtype').value='';
  document.getElementById('m-address').value='';
  document.getElementById('m-loadtime').value='';
  document.getElementById('m-notes').value='';
  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('show');}

function submitJob(){
  var docket=document.getElementById('m-docket').value.trim();
  var mpa=document.getElementById('m-mpa').value.trim();
  var slump=document.getElementById('m-slump').value.trim();
  var mixType=document.getElementById('m-mixtype').value;
  var address=document.getElementById('m-address').value.trim();
  var loadTime=document.getElementById('m-loadtime').value;
  var notes=document.getElementById('m-notes').value.trim();
  if(!docket||!mpa||!slump||!mixType||!address){showToast('⚠ Fill in all required fields');return;}
  db.ref('jobs/'+selectedDriverId).set({
    docket:docket,mpa:parseFloat(mpa),slump:parseFloat(slump),
    mixType:mixType,address:address,loadTime:loadTime,notes:notes,
    driverName:selectedDriverName,fleet:selectedDriverFleet,
    status:'assigned',assignedAt:Date.now()
  }).then(function(){
    closeModalDirect();
    showToast('✓ Job assigned to '+selectedDriverName+'!');
  });
}

function clearJob(driverId){
  if(!confirm('Clear this driver\'s job?'))return;
  db.ref('jobs/'+driverId).remove();
}

// Notifications
function renderNotifs(){
  var list=Object.entries(liveNotifs).sort(function(a,b){return b[1].timestamp-a[1].timestamp;});
  if(list.length===0){
    document.getElementById('notif-list').innerHTML='<div class="empty-notif">No alerts yet.</div>';
    return;
  }
  var typeIcons={loading:'🏗️',arrived:'📍',issue:'⚠️',return:'🔄'};
  var typeLabels={loading:'Loading',arrived:'Arrived on Site',issue:'Issue Reported',return:'Return Concrete'};
  var typeColors={loading:'var(--on)',arrived:'var(--on)',issue:'var(--off)',return:'var(--yellow)'};
  document.getElementById('notif-list').innerHTML=list.map(function(entry){
    var key=entry[0],n=entry[1];
    var isUnread=!n.seen;
    var isIssue=n.type==='issue';
    var color=typeColors[n.type]||'var(--yellow)';
    var t=new Date(n.timestamp);
    var timeStr=t.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})+' · '+t.toLocaleDateString('en-NZ',{day:'numeric',month:'short'});
    return '<div class="notif-card '+(isUnread?'unread':'')+' '+(isIssue?'issue':'')+'">'+
      '<div class="nc-header">'+
        '<div class="nc-type" style="color:'+color+'">'+(typeIcons[n.type]||'🔔')+' '+(typeLabels[n.type]||n.type)+'</div>'+
        '<div class="nc-time">'+timeStr+'</div>'+
      '</div>'+
      '<div class="nc-driver">'+n.driverName+' · Fleet '+n.fleet+'</div>'+
      '<div class="nc-detail">'+
        (n.docket?'Docket: <span>'+n.docket+'</span><br>':'')+
        (n.address?'→ <span>'+n.address+'</span><br>':'')+
        (n.description?'<span>'+n.description+'</span>':'')+
      '</div>'+
      (isUnread?'<button class="mark-read-btn" onclick="markRead(\''+key+'\')">Mark as read</button>':'')+
    '</div>';
  }).join('');
}

function markRead(key){db.ref('notifications/'+key+'/seen').set(true);}
function updateNotifBadge(){
  var count=Object.values(liveNotifs).filter(function(n){return !n.seen;}).length;
  var badge=document.getElementById('notif-badge');
  badge.textContent=count;
  count>0?badge.classList.add('show'):badge.classList.remove('show');
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
</script>
</body>
</html>
