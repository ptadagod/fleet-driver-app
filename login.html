<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fleet — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--border:#1e2330;--on:#00e5a0;--off:#ff4d6d;--text:#e8eaf0;--muted:#5a6080;--yellow:#f5c842;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.box{background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:40px 36px;max-width:400px;width:100%;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:.9;margin-bottom:4px;}
.logo span{color:var(--on);}
.sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px;}
.divider{height:1px;background:var(--border);margin-bottom:24px;}
.field{margin-bottom:14px;}
.field input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:13px 14px;border-radius:12px;outline:none;}
.field input:focus{border-color:var(--on);}
.field input::placeholder{color:var(--muted);}
.submit-btn{width:100%;background:var(--on);color:#0d0f14;border:none;border-radius:12px;padding:15px;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;margin-bottom:14px;}
.submit-btn:disabled{opacity:.5;cursor:not-allowed;}
.signup-link{text-align:center;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.signup-link a{color:var(--on);text-decoration:none;}
.msg{font-family:'DM Mono',monospace;font-size:12px;text-align:center;padding:10px;border-radius:8px;margin-bottom:14px;display:none;}
.msg.error{color:var(--off);background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.2);}
.spinner{width:20px;height:20px;border:2px solid rgba(13,15,20,.3);border-top-color:#0d0f14;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Fleet<br><span>Ops</span></div>
  <div class="sub">Sign in to your account</div>
  <div class="divider"></div>

  <div class="msg" id="msg"></div>
  <div class="field"><input type="email" id="email" placeholder="Email address" autocomplete="email"></div>
  <div class="field"><input type="password" id="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
  <button class="submit-btn" id="submit-btn" onclick="doLogin()">SIGN IN</button>
  <div class="signup-link">Don't have an account? <a href="signup.html">Sign up</a></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyCzvWNFjDlt-tjaAigMVZ9BicWCUa0guG0",
  authDomain:"fleetshifttracker.firebaseapp.com",
  databaseURL:"https://fleetshifttracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"fleetshifttracker",
  storageBucket:"fleetshifttracker.firebasestorage.app",
  messagingSenderId:"276983000908",
  appId:"1:276983000908:web:7948d3ccab92359795e9e9"
});
var auth=firebase.auth(),db=firebase.database();

// If already logged in, redirect
auth.onAuthStateChanged(function(user){
  if(user){
    db.ref('users/'+user.uid).once('value').then(function(snap){
      var u=snap.val();
      if(!u)return;
      if(u.role==='dispatcher') window.location.href='dispatcher.html';
      else if(u.role==='collections') window.location.href='collections.html';
      else window.location.href='driver-clockin.html';
    });
  }
});

function showMsg(text){
  var el=document.getElementById('msg');
  el.className='msg error';el.textContent=text;el.style.display='block';
}

function doLogin(){
  var email=document.getElementById('email').value.trim();
  var pass=document.getElementById('password').value;
  if(!email||!pass){showMsg('Please enter your email and password.');return;}
  var btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>Signing in…';

  auth.signInWithEmailAndPassword(email,pass).then(function(cred){
    return db.ref('users/'+cred.user.uid).once('value');
  }).then(function(snap){
    var u=snap.val();
    if(!u){auth.signOut();showMsg('Account not found. Please sign up.');btn.disabled=false;btn.textContent='SIGN IN';return;}
    if(u.role==='collections'&&!u.approved){
      auth.signOut();
      btn.disabled=false;btn.textContent='SIGN IN';
      showMsg('Your account is pending admin approval. Please check back soon.');
      return;
    }
    // Redirect by role
    if(u.role==='dispatcher') window.location.href='dispatcher.html';
    else if(u.role==='collections') window.location.href='collections.html';
    else window.location.href='driver-clockin.html';
  }).catch(function(err){
    btn.disabled=false;btn.textContent='SIGN IN';
    var msgs={
      'auth/user-not-found':'No account found with this email.',
      'auth/wrong-password':'Incorrect password.',
      'auth/invalid-email':'Please enter a valid email address.',
      'auth/invalid-credential':'Email or password is incorrect.',
      'auth/too-many-requests':'Too many attempts. Please try again later.',
    };
    showMsg(msgs[err.code]||err.message);
  });
}
</script>
</body>
</html>
