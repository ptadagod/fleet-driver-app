<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fleet Collections</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0f14;--surface:#13161e;--border:#1e2330;--on:#00e5a0;--off:#ff4d6d;--on-dim:rgba(0,229,160,0.12);--off-dim:rgba(255,77,109,0.12);--text:#e8eaf0;--muted:#5a6080;--yellow:#f5c842;--yellow-dim:rgba(245,200,66,0.12);--purple:#a78bfa;--purple-dim:rgba(167,139,250,0.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}
.top-bar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:20;}
.tab-bar-inner{display:flex;overflow-x:auto;}
.tab-btn{position:relative;padding:16px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);background:none;border:none;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;}
.tab-btn.active{color:var(--purple);border-bottom-color:var(--purple);}
.tab-badge{position:absolute;top:8px;right:4px;font-size:9px;font-weight:700;border-radius:100px;padding:2px 5px;min-width:16px;text-align:center;display:none;}
.tab-badge.show{display:block;}
.tab-badge.yellow{background:var(--yellow);color:#0d0f14;}
.tab-badge.red{background:var(--off);color:#fff;}
.top-right{display:flex;align-items:center;gap:10px;padding:8px 0;flex-shrink:0;}
.user-name{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.signout-btn{font-family:'DM Mono',monospace;font-size:11px;color:var(--off);background:none;border:1px solid rgba(255,77,109,.3);border-radius:100px;padding:5px 12px;cursor:pointer;}
.tab-content{display:none;} .tab-content.active{display:block;}
.container{max-width:960px;margin:0 auto;padding:24px;}
.page-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--purple);margin-bottom:6px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:.9;margin-bottom:20px;}
.page-title span{color:var(--purple);}

/* Job cards */
.job-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;position:relative;overflow:hidden;}
.job-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:16px 16px 0 0;}
.job-card.status-transit::before,.job-card.status-arrived::before,.job-card.status-pouring::before{background:var(--on);}
.job-card.status-return::before{background:var(--yellow);}
.job-card.status-issue::before{background:var(--off);}
.jc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.jc-driver{font-size:18px;font-weight:700;color:var(--text);}
.jc-fleet{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-top:2px;}
.jc-status{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.jc-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.jc-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.jc-pill.mpa{color:var(--on);border-color:rgba(0,229,160,.3);background:var(--on-dim);}
.jc-pill.docket{color:var(--muted);border-color:var(--border);}
.jc-pill.slump{color:var(--yellow);border-color:rgba(245,200,66,.3);background:var(--yellow-dim);}
.jc-address{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:10px;}
.jc-address span{color:var(--text);}
.start-job-btn{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1px;background:var(--purple-dim);border:1px solid rgba(167,139,250,.4);color:var(--purple);border-radius:100px;padding:8px 18px;cursor:pointer;}
.start-job-btn:hover{background:rgba(167,139,250,.2);}
.eta-pill{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;color:var(--on);background:var(--on-dim);border:1px solid rgba(0,229,160,.3);border-radius:100px;padding:5px 12px;margin-bottom:10px;}
.eta-dot{width:6px;height:6px;border-radius:50%;background:var(--on);animation:pulse 1.5s infinite;}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:24px 24px 40px;}
.modal-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px;}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--purple);margin-bottom:4px;}
.modal-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);margin-bottom:20px;}
.auto-field{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;}
.af-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;}
.af-value{font-size:15px;font-weight:700;color:var(--text);}
.modal-action-btn{width:100%;border:2px solid;border-radius:14px;padding:16px;font-family:'DM Mono',monospace;font-size:14px;font-weight:700;letter-spacing:2px;cursor:pointer;background:transparent;margin-bottom:10px;display:flex;align-items:center;justify-content:center;gap:10px;}
.modal-action-btn.purple{border-color:var(--purple);color:var(--purple);background:var(--purple-dim);}
.modal-action-btn.green{border-color:var(--on);color:var(--on);background:var(--on-dim);}
.modal-action-btn:disabled{opacity:.4;cursor:not-allowed;}
.modal-close{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:100px;padding:8px 20px;cursor:pointer;width:100%;}
.divider{height:1px;background:var(--border);margin:16px 0;}

/* Mould tracker */
.mould-section-title{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.mould-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.mould-input-row{display:flex;gap:10px;margin-bottom:16px;align-items:flex-end;}
.mould-input-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:16px;padding:12px 14px;border-radius:12px;outline:none;text-transform:uppercase;}
.mould-input-row input:focus{border-color:var(--purple);}
.mould-input-row input::placeholder{color:var(--muted);text-transform:none;}
.add-mould-btn{background:var(--purple-dim);border:1px solid rgba(167,139,250,.4);color:var(--purple);font-family:'DM Mono',monospace;font-size:12px;font-weight:700;letter-spacing:1px;border-radius:12px;padding:12px 18px;cursor:pointer;white-space:nowrap;}
.mould-card{background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:10px;}
.mould-card.full{border-color:rgba(0,229,160,.3);opacity:.7;}
.mc-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.mc-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--purple);line-height:1;}
.mc-vol{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
.mc-total{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;}
.mc-progress{height:8px;background:var(--border);border-radius:100px;overflow:hidden;margin-bottom:12px;}
.mc-progress-bar{height:100%;border-radius:100px;transition:width .4s ease;}
.pour-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.pour-btn{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.pour-btn:hover:not(:disabled){border-color:var(--purple);background:var(--purple-dim);}
.pour-btn:disabled{opacity:.3;cursor:not-allowed;}
.pour-btn .pb-icon{font-size:18px;margin-bottom:4px;}
.pour-btn .pb-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.05em;}
.pour-btn .pb-vol{font-family:'DM Mono',monospace;font-size:12px;font-weight:700;color:var(--purple);}
.mc-history{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.mc-history-row{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);line-height:1.9;display:flex;justify-content:space-between;}
.mc-history-row span{color:var(--text);}
.mc-full-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--on);background:var(--on-dim);border:1px solid rgba(0,229,160,.3);border-radius:100px;padding:4px 12px;}
.mc-remove{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px;}

/* Summary */
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;}
.sc-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sc-title{font-size:16px;font-weight:700;color:var(--text);}
.sc-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);}
.sc-pills{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px;}
.sc-pill{font-family:'DM Mono',monospace;font-size:10px;padding:4px 10px;border-radius:100px;border:1px solid;}
.sc-pill.good{color:var(--on);border-color:rgba(0,229,160,.3);background:var(--on-dim);}
.sc-pill.warn{color:var(--yellow);border-color:rgba(245,200,66,.3);background:var(--yellow-dim);}
.sc-pill.purple{color:var(--purple);border-color:rgba(167,139,250,.3);background:var(--purple-dim);}
.sc-comparison{background:var(--bg);border-radius:10px;padding:12px 14px;}
.sc-row{display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:4px 0;}
.sc-row span{color:var(--text);}
.sc-row.total{border-top:1px solid var(--border);margin-top:4px;padding-top:8px;color:var(--text);font-weight:700;}

.empty-state{text-align:center;padding:48px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}
.empty-state .emoji{font-size:36px;margin-bottom:10px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);transition:transform .3s;z-index:200;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>

<div class="top-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" onclick="switchTab('live')" id="tab-live">🚛 Live Jobs</button>
    <button class="tab-btn" onclick="switchTab('moulds')" id="tab-moulds">
      🧪 Moulds<span class="tab-badge yellow" id="moulds-badge"></span>
    </button>
    <button class="tab-btn" onclick="switchTab('records')" id="tab-records">📋 Records</button>
  </div>
  <div class="top-right">
    <span class="user-name" id="user-name"></span>
    <button class="signout-btn" onclick="doSignOut()">Sign out</button>
  </div>
</div>

<!-- LIVE JOBS -->
<div class="tab-content active" id="content-live">
  <div class="container">
    <div class="page-eyebrow">Collections</div>
    <div class="page-title">Live <span>Jobs</span></div>
    <div id="live-jobs-list"></div>
  </div>
</div>

<!-- MOULDS -->
<div class="tab-content" id="content-moulds">
  <div class="container">
    <div class="page-eyebrow">Active Session</div>
    <div class="page-title">Mould <span>Tracker</span></div>
    <div id="active-session-info" style="margin-bottom:16px;"></div>
    <div class="mould-section-title">Add Mould</div>
    <div class="mould-input-row">
      <input type="text" id="mould-input" placeholder="Enter mould number (e.g. P12)" oninput="this.value=this.value.toUpperCase()" onkeydown="if(event.key==='Enter')addMould()">
      <button class="add-mould-btn" onclick="addMould()">+ Add</button>
    </div>
    <div class="mould-section-title">Active Moulds</div>
    <div id="moulds-list"></div>
  </div>
</div>

<!-- RECORDS -->
<div class="tab-content" id="content-records">
  <div class="container">
    <div class="page-eyebrow">Completed</div>
    <div class="page-title">Pour <span>Records</span></div>
    <div id="records-list"></div>
  </div>
</div>

<!-- Job intake modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">🧪 Start Collection</div>
    <div class="modal-sub" id="modal-sub">Auto-filled from driver report</div>

    <div class="mould-section-title" style="margin-bottom:10px">Job Details</div>
    <div class="auto-field"><div class="af-label">Driver</div><div class="af-value" id="af-driver">—</div></div>
    <div class="auto-field"><div class="af-label">Fleet #</div><div class="af-value" id="af-fleet">—</div></div>
    <div class="auto-field"><div class="af-label">Docket</div><div class="af-value" id="af-docket">—</div></div>
    <div class="auto-field"><div class="af-label">MPa</div><div class="af-value" id="af-mpa">—</div></div>
    <div class="auto-field"><div class="af-label">Slump</div><div class="af-value" id="af-slump">—</div></div>
    <div class="auto-field"><div class="af-label">Volume Returned</div><div class="af-value" id="af-volume">—</div></div>
    <div class="auto-field"><div class="af-label">Arrival Time</div><div class="af-value" id="af-arrival">—</div></div>

    <div class="divider"></div>
    <button class="modal-action-btn purple" id="modal-start-btn" onclick="startCollection()">🧪 START COLLECTION JOB</button>
    <button class="modal-close" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
// app init

firebase.initializeApp({
  apiKey:"AIzaSyCzvWNFjDlt-tjaAigMVZ9BicWCUa0guG0",
  authDomain:"fleetshifttracker.firebaseapp.com",
  databaseURL:"https://fleetshifttracker-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"fleetshifttracker",
  storageBucket:"fleetshifttracker.firebasestorage.app",
  messagingSenderId:"276983000908",
  appId:"1:276983000908:web:7948d3ccab92359795e9e9"
});
var auth=firebase.auth(),db=firebase.database();

var MOULD_CAPACITY=0.42;
var POUR_AMOUNTS={quarter:0.11,half:0.22,'three-quarter':0.31,full:0.42};
var POUR_LABELS={quarter:'¼',half:'½','three-quarter':'¾',full:'Full'};

var currentUser=null,liveJobs={},liveShifts={},liveReturns={};
var activeSession=null; // current mould session
var moulds={}; // {mouldNum: {pours:[{amount,label,time}], total}}
var selectedReturnKey=null,selectedReturnData=null;
var dbStarted=false;

auth.onAuthStateChanged(function(user){
  if(!user){window.location.href='login.html';return;}
  db.ref('users/'+user.uid).once('value').then(function(snap){
    var u=snap.val();
    if(!u||(u.role!=='collections'&&u.role!=='admin')||(!u.approved&&u.role!=='admin')){
      auth.signOut();window.location.href='login.html';return;
    }
    currentUser=u;currentUser.uid=user.uid;
    document.getElementById('user-name').textContent=u.name;
    if(!dbStarted)startDb();
  });
});

function startDb(){
  dbStarted=true;
  db.ref('shifts').on('value',function(s){liveShifts=s.val()||{};renderLiveJobs();});
  db.ref('jobs').on('value',function(s){liveJobs=s.val()||{};renderLiveJobs();});
  db.ref('returns').on('value',function(s){liveReturns=s.val()||{};renderLiveJobs();});
  // Load active mould session if any
  db.ref('mould_sessions').orderByChild('collectorId').equalTo(currentUser.uid)
    .limitToLast(1).on('value',function(s){
      var data=s.val();
      if(data){
        var entries=Object.entries(data);
        var last=entries[entries.length-1];
        if(last[1].status==='active'){
          activeSession={key:last[0],...last[1]};
          moulds=last[1].moulds||{};
        } else {
          activeSession=null;moulds={};
        }
      } else {activeSession=null;moulds={};}
      renderMoulds();
    });
  db.ref('mould_sessions').orderByChild('status').equalTo('complete')
    .on('value',function(s){renderRecords(s.val()||{});});
}

function switchTab(tab){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active');
  document.getElementById('content-'+tab).classList.add('active');
}

// ── LIVE JOBS ──────────────────────────────────────────────────────────────
var STATUS_LABELS={transit:'🚛 In Transit',arrived:'📍 Arrived',pouring:'🪣 Pouring',return:'🔄 Returning',done:'✅ Done'};
var STATUS_COLORS={transit:'var(--on)',arrived:'var(--on)',pouring:'var(--on)',return:'var(--yellow)',done:'var(--muted)'};

function renderLiveJobs(){
  // Show jobs that are in transit, arrived, pouring, or returning
  var visible=['transit','arrived','pouring','return'];
  var cards=[];
  Object.entries(liveJobs).forEach(function(entry){
    var driverId=entry[0],job=entry[1];
    if(!visible.includes(job.status))return;
    var shift=liveShifts[driverId]||{};
    // Find matching return record
    var returnRecord=null;
    if(job.status==='return'){
      returnRecord=Object.entries(liveReturns).find(function(e){
        return e[1].fleet===job.fleet&&e[1].status==='pending';
      });
    }
    cards.push({driverId,job,shift,returnRecord});
  });

  if(cards.length===0){
    document.getElementById('live-jobs-list').innerHTML='<div class="empty-state"><div class="emoji">🚛</div>No active jobs right now.</div>';
    return;
  }

  document.getElementById('live-jobs-list').innerHTML=cards.map(function(c){
    var j=c.job,s=c.shift,rr=c.returnRecord;
    var st=j.status;
    var color=STATUS_COLORS[st]||'var(--muted)';
    var label=STATUS_LABELS[st]||st;

    var etaHtml='';
    if(st==='return'&&rr&&rr[1].etaTimestamp){
      var minsLeft=Math.max(0,Math.ceil((rr[1].etaTimestamp-Date.now())/60000));
      etaHtml='<div class="eta-pill"><div class="eta-dot"></div>ETA: '+(minsLeft<=0?'Arriving now':'~'+minsLeft+' min')+'</div><br>';
    }

    var actionHtml='';
    if(st==='return'&&rr){
      // Check if collection already started
      var alreadyStarted=activeSession&&activeSession.returnKey===rr[0];
      if(!alreadyStarted){
        actionHtml='<button class="start-job-btn" onclick="openIntakeModal(\''+rr[0]+'\')">🧪 Start Collection Job</button>';
      } else {
        actionHtml='<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--purple);">🧪 Collection in progress → <button onclick="switchTab(\'moulds\')" style="background:none;border:none;color:var(--purple);cursor:pointer;font-family:\'DM Mono\',monospace;font-size:11px;text-decoration:underline;">View Moulds</button></div>';
      }
    }

    return '<div class="job-card status-'+st+'">'+
      '<div class="jc-top">'+
        '<div><div class="jc-driver">'+j.driverName+'</div><div class="jc-fleet">Fleet #'+j.fleet+' · '+(s.yardName||'')+'</div></div>'+
        '<div class="jc-status" style="color:'+color+';border-color:'+color+'40;background:'+color+'15">'+label+'</div>'+
      '</div>'+
      '<div class="jc-pills">'+
        '<div class="jc-pill mpa">'+j.mpa+' MPa</div>'+
        '<div class="jc-pill slump">Slump '+j.slump+'mm</div>'+
        '<div class="jc-pill docket">'+j.docket+'</div>'+
        (j.mixType?'<div class="jc-pill docket">'+j.mixType+'</div>':'')+
      '</div>'+
      (j.address?'<div class="jc-address">📍 <span>'+j.address+'</span></div>':'')+
      etaHtml+
      actionHtml+
    '</div>';
  }).join('');
}

// ── INTAKE MODAL ───────────────────────────────────────────────────────────
function openIntakeModal(returnKey){
  var r=liveReturns[returnKey];if(!r)return;
  selectedReturnKey=returnKey;selectedReturnData=r;

  // Find job for slump
  var job=Object.values(liveJobs).find(function(j){return j.fleet===r.fleet;});

  document.getElementById('af-driver').textContent=r.driverName;
  document.getElementById('af-fleet').textContent=r.fleet;
  document.getElementById('af-docket').textContent=r.docket||'—';
  document.getElementById('af-mpa').textContent=(r.mpa||'—')+' MPa';
  document.getElementById('af-slump').textContent=job?(job.slump+'mm'):'—';
  document.getElementById('af-volume').textContent=r.volume+'m³';
  document.getElementById('af-arrival').textContent=r.etaTimestamp?
    new Date(r.etaTimestamp).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'}):
    new Date().toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'});

  document.getElementById('modal-overlay').classList.add('show');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('show');}
function closeModalOutside(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

function startCollection(){
  var r=selectedReturnData;if(!r)return;
  var job=Object.values(liveJobs).find(function(j){return j.fleet===r.fleet;});
  var sessionData={
    collectorId:currentUser.uid,collectorName:currentUser.name,
    returnKey:selectedReturnKey,
    driverName:r.driverName,fleet:r.fleet,docket:r.docket,
    mpa:r.mpa,slump:job?job.slump:null,
    volumeReturned:r.volume,
    arrivalTime:Date.now(),
    status:'active',moulds:{},
    totalPoured:0,startedAt:Date.now()
  };
  db.ref('mould_sessions').push(sessionData).then(function(){
    closeModal();
    switchTab('moulds');
    showToast('✓ Collection job started!');
  });
}

// ── MOULD TRACKER ──────────────────────────────────────────────────────────
function renderMoulds(){
  var sessionInfo=document.getElementById('active-session-info');
  if(!activeSession){
    sessionInfo.innerHTML='<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;font-family:\'DM Mono\',monospace;font-size:12px;color:var(--muted);text-align:center;">No active collection session.<br>Start one from the Live Jobs tab when a driver returns.</div>';
    document.getElementById('moulds-list').innerHTML='';
    document.getElementById('moulds-badge').classList.remove('show');
    return;
  }
  var totalPoured=Object.values(moulds).reduce(function(sum,m){return sum+(m.total||0);},0);
  var volumeReturned=activeSession.volumeReturned||0;
  var diff=volumeReturned-totalPoured;
  sessionInfo.innerHTML=
    '<div style="background:var(--purple-dim);border:1px solid rgba(167,139,250,.3);border-radius:14px;padding:16px 18px;margin-bottom:4px;">'+
      '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;">'+
        '<div>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--purple);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;">Active Session</div>'+
          '<div style="font-size:16px;font-weight:700;color:var(--text);">'+activeSession.driverName+' · Fleet '+activeSession.fleet+'</div>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);">Docket '+activeSession.docket+' · '+activeSession.mpa+'MPa</div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);">Returned</div>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:22px;font-weight:700;color:var(--yellow);">'+volumeReturned.toFixed(2)+'m³</div>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:'+(Math.abs(diff)<0.05?'var(--on)':'var(--yellow)')+'">'+
            'Poured: '+totalPoured.toFixed(2)+'m³ · Remaining: '+(Math.max(0,diff)).toFixed(2)+'m³'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">'+
        '<button onclick="finishSession()" style="font-family:\'DM Mono\',monospace;font-size:12px;font-weight:700;background:var(--on-dim);border:1px solid rgba(0,229,160,.4);color:var(--on);border-radius:100px;padding:8px 18px;cursor:pointer;">✓ Complete Session</button>'+
      '</div>'+
    '</div>';

  var mouldEntries=Object.entries(moulds);
  var badge=document.getElementById('moulds-badge');
  if(mouldEntries.length>0){badge.textContent=mouldEntries.length;badge.classList.add('show');}else badge.classList.remove('show');

  if(mouldEntries.length===0){
    document.getElementById('moulds-list').innerHTML='<div style="font-family:\'DM Mono\',monospace;font-size:12px;color:var(--muted);text-align:center;padding:20px 0;">Add moulds above to start tracking.</div>';
    return;
  }

  document.getElementById('moulds-list').innerHTML=mouldEntries.map(function(entry){
    var num=entry[0],m=entry[1];
    var total=m.total||0;
    var pct=Math.min(100,(total/MOULD_CAPACITY)*100);
    var isFull=total>=MOULD_CAPACITY-0.001;
    var remaining=Math.max(0,MOULD_CAPACITY-total);
    var pourCount=(m.pours||[]).length;
    var canPour=!isFull&&pourCount<3;

    // Available pour options (what makes sense given remaining space)
    var pourOptions=['quarter','half','three-quarter','full'];
    var progressColor=isFull?'var(--on)':pct>66?'var(--yellow)':'var(--purple)';

    return '<div class="mould-card '+(isFull?'full':'')+'" id="mould-'+num+'">'+
      '<div class="mc-top">'+
        '<div>'+
          '<div class="mc-num">'+num+'</div>'+
          '<div class="mc-vol">Pour '+pourCount+'/3 · '+total.toFixed(2)+'/'+MOULD_CAPACITY+'m³</div>'+
        '</div>'+
        '<div style="text-align:right;">'+
          (isFull?
            '<div class="mc-full-badge">✓ FULL</div>':
            '<div class="mc-total" style="color:var(--purple)">'+remaining.toFixed(2)+'m³ left</div>')+
          '<button class="mc-remove" onclick="removeMould(\''+num+'\')" title="Remove mould">✕</button>'+
        '</div>'+
      '</div>'+
      '<div class="mc-progress"><div class="mc-progress-bar" style="width:'+pct+'%;background:'+progressColor+'"></div></div>'+
      (canPour?
        '<div style="font-family:\'DM Mono\',monospace;font-size:10px;color:var(--muted);margin-bottom:8px;letter-spacing:.1em;text-transform:uppercase;">Select amount to pour</div>'+
        '<div class="pour-btns">'+
          pourOptions.map(function(opt){
            var vol=POUR_AMOUNTS[opt];
            // Disable if adding this would exceed capacity or not make sense given remaining
            var wouldExceed=(total+vol)>MOULD_CAPACITY+0.001;
            var isDisabled=wouldExceed?'disabled':'';
            // Highlight if this fills it exactly
            var isExact=Math.abs((total+vol)-MOULD_CAPACITY)<0.01;
            return '<button class="pour-btn" '+isDisabled+' onclick="addPour(\''+num+'\',\''+opt+'\')"'+
              (isExact?' style="border-color:var(--on);background:var(--on-dim);"':'')+'>'+
              '<div class="pb-icon">'+POUR_LABELS[opt]+'</div>'+
              '<div class="pb-label">'+opt.replace('-',' ')+'</div>'+
              '<div class="pb-vol">'+vol.toFixed(2)+'m³</div>'+
            '</button>';
          }).join('')+
        '</div>'
      :'<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:'+(isFull?'var(--on)':'var(--muted)')+'">'+
          (isFull?'✓ Mould is full':'Max 3 pours reached')+
        '</div>')+
      (m.pours&&m.pours.length>0?
        '<div class="mc-history">'+
          m.pours.map(function(p,i){
            return '<div class="mc-history-row">'+
              '<span>Pour '+(i+1)+' · '+POUR_LABELS[p.label]+' ('+p.label+')</span>'+
              '<span>'+p.amount.toFixed(2)+'m³ · '+new Date(p.time).toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})+'</span>'+
            '</div>';
          }).join('')+
        '</div>'
      :'')+
    '</div>';
  }).join('');
}

function addMould(){
  var input=document.getElementById('mould-input');
  var num=input.value.trim().toUpperCase();
  if(!num){showToast('⚠ Enter a mould number');return;}
  if(!/^P\d+$/.test(num)){showToast('⚠ Format must be P1–P800 (e.g. P12)');return;}
  var n=parseInt(num.slice(1));
  if(n<1||n>800){showToast('⚠ Mould number must be P1–P800');return;}
  if(!activeSession){showToast('⚠ Start a collection session first');return;}
  if(moulds[num]){showToast('⚠ '+num+' already added');return;}
  moulds[num]={total:0,pours:[]};
  saveMoulds();
  input.value='';
  showToast('✓ Added '+num);
}

function addPour(mouldNum,option){
  if(!moulds[mouldNum])return;
  var m=moulds[mouldNum];
  var amount=POUR_AMOUNTS[option];
  var newTotal=m.total+amount;
  if(newTotal>MOULD_CAPACITY+0.001){showToast('⚠ Would exceed mould capacity');return;}
  if((m.pours||[]).length>=3){showToast('⚠ Max 3 pours per mould');return;}
  m.total=Math.min(MOULD_CAPACITY,parseFloat(newTotal.toFixed(3)));
  if(!m.pours)m.pours=[];
  m.pours.push({label:option,amount:amount,time:Date.now()});
  saveMoulds();
  showToast('✓ Poured '+option+' into '+mouldNum);
}

function removeMould(num){
  if(!confirm('Remove '+num+' from this session?'))return;
  delete moulds[num];
  saveMoulds();
}

function saveMoulds(){
  if(!activeSession)return;
  var totalPoured=Object.values(moulds).reduce(function(s,m){return s+(m.total||0);},0);
  db.ref('mould_sessions/'+activeSession.key).update({moulds:moulds,totalPoured:totalPoured});
}

function finishSession(){
  if(!activeSession)return;
  var mouldEntries=Object.entries(moulds);
  if(mouldEntries.length===0&&!confirm('No moulds added. Complete session anyway?'))return;
  var totalPoured=Object.values(moulds).reduce(function(s,m){return s+(m.total||0);},0);
  var volumeReturned=activeSession.volumeReturned||0;
  var waste=Math.max(0,volumeReturned-totalPoured);
  db.ref('mould_sessions/'+activeSession.key).update({
    status:'complete',completedAt:Date.now(),
    totalPoured:totalPoured,volumeReturned:volumeReturned,waste:waste,
    mouldCount:mouldEntries.length
  }).then(function(){
    // Acknowledge the return record
    if(activeSession.returnKey) db.ref('returns/'+activeSession.returnKey+'/status').set('acknowledged');
    showToast('✓ Session complete!');
    switchTab('records');
  });
}

// ── RECORDS ────────────────────────────────────────────────────────────────
function renderRecords(data){
  var list=Object.entries(data).sort(function(a,b){return b[1].completedAt-a[1].completedAt;});
  if(list.length===0){
    document.getElementById('records-list').innerHTML='<div class="empty-state"><div class="emoji">📋</div>No completed sessions yet.</div>';
    return;
  }
  document.getElementById('records-list').innerHTML=list.map(function(entry){
    var key=entry[0],s=entry[1];
    var t=new Date(s.completedAt||s.startedAt);
    var timeStr=t.toLocaleTimeString('en-NZ',{hour:'2-digit',minute:'2-digit'})+' · '+t.toLocaleDateString('en-NZ',{day:'numeric',month:'short'});
    var mouldEntries=Object.entries(s.moulds||{});
    var wasteClass=s.waste<0.05?'good':'warn';
    return '<div class="summary-card">'+
      '<div class="sc-header">'+
        '<div>'+
          '<div class="sc-title">'+s.driverName+' · Fleet '+s.fleet+'</div>'+
          '<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);">Docket '+s.docket+' · '+s.mpa+'MPa · Collected by '+s.collectorName+'</div>'+
        '</div>'+
        '<div class="sc-time">'+timeStr+'</div>'+
      '</div>'+
      '<div class="sc-pills">'+
        '<div class="sc-pill purple">🧪 '+mouldEntries.length+' moulds</div>'+
        '<div class="sc-pill good">Poured: '+(s.totalPoured||0).toFixed(2)+'m³</div>'+
        '<div class="sc-pill '+wasteClass+'">Waste: '+(s.waste||0).toFixed(2)+'m³</div>'+
      '</div>'+
      '<div class="sc-comparison">'+
        '<div class="sc-row"><span>Volume returned by driver</span><span>'+(s.volumeReturned||0).toFixed(2)+'m³</span></div>'+
        '<div class="sc-row"><span>Total poured into moulds</span><span>'+(s.totalPoured||0).toFixed(2)+'m³</span></div>'+
        '<div class="sc-row total"><span>Difference</span><span>'+(s.waste||0).toFixed(2)+'m³</span></div>'+
        (mouldEntries.length>0?
          '<div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">'+
            mouldEntries.map(function(me){
              var mn=me[0],mm=me[1];
              return '<div class="sc-row"><span>'+mn+' ('+((mm.pours||[]).length)+' pours)</span><span>'+(mm.total||0).toFixed(2)+'m³ '+(mm.total>=MOULD_CAPACITY-0.001?'✓ Full':'')+'</span></div>';
            }).join('')+
          '</div>'
        :'')+
      '</div>'+
    '</div>';
  }).join('');
}

function doSignOut(){auth.signOut();window.location.href='login.html';}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}

</script>
